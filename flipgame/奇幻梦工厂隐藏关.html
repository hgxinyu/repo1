<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>奇幻梦工厂隐藏关 · ShinE</title>  <script>
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      var svg = isLocal ? 'assets/local-logo.svg' : 'assets/shine-logo.svg';
      var png32 = isLocal ? 'assets/local-logo-32.png' : 'assets/shine-logo-32.png';
      var ico = isLocal ? 'assets/local-favicon.ico' : 'assets/favicon.ico';
      var apple = isLocal ? 'assets/local-logo-180.png' : 'assets/shine-logo-180.png';
      var manifest = isLocal ? 'site.local.webmanifest' : 'site.webmanifest';
      var theme = isLocal ? '#fb7185' : '#6366f1';
      document.write('<link rel="icon" type="image/svg+xml" href="' + svg + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="' + png32 + '">');
      document.write('<link rel="shortcut icon" href="' + ico + '">');
      document.write('<link rel="apple-touch-icon" sizes="180x180" href="' + apple + '">');
      document.write('<link rel="manifest" href="' + manifest + '">');
      document.write('<meta name="theme-color" content="' + theme + '">');
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{
      --gap:12px; --radius:16px; --shadow:0 6px 16px rgba(0,0,0,.06);
      --border:#e5e7eb; --ink:#111827; --muted:#6b7280; --brand:#6366f1;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{position:relative;background:#f9fafb;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    .wrap{max-width:980px;margin:0 auto;padding:24px;display:flex;flex-direction:column;gap:16px;min-height:100vh}
    .site-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap}
    .site-header .title h1{margin:0;font-size:24px}
    .tools{display:flex;gap:8px;align-items:center}
    .main{display:grid;grid-template-columns:1fr;gap:16px}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
    .preview{display:flex;justify-content:center;align-items:center}
    .preview img{max-width:100%;height:auto;border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
    /* floating nav */
    #topbar-nav{
      position:absolute; right:12px; top:12px; z-index:1000;
      width:auto;
      display:inline-flex; flex-direction:row; gap:8px; align-items:center;
      background:rgba(255,255,255,.9);
      border:1px solid #e5e7eb;
      padding:6px 8px; border-radius:999px; box-shadow:0 10px 24px rgba(15,23,42,.12);
      backdrop-filter:saturate(140%) blur(4px);
    }
    #topbar-nav .btn{padding:8px 12px; border-radius:999px; font-size:13px; white-space:nowrap; text-align:center;}
    @media (max-width:480px){ #topbar-nav{ right:8px; top:8px; } }
    .langbar{
      position:absolute; left:12px; top:12px; z-index:1100;
      display:inline-flex; align-items:center;
      background:rgba(255,255,255,.9);
      border:1px solid #e5e7eb;
      padding:6px 8px; border-radius:999px; box-shadow:0 10px 24px rgba(15,23,42,.12);
      backdrop-filter:saturate(140%) blur(4px);
    }
    .langbar .btn{padding:8px 12px; border-radius:999px; font-size:13px; white-space:nowrap;}
    /* bottom-left logo */
    .logo-bottom-left{
      position:fixed; left:12px; bottom:12px; z-index:1000;
      font-size:20px; font-weight:400;
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 14px; border-radius:999px;
      background:#fff; border:1px solid #e5e7eb; box-shadow:var(--shadow);
      color:#111827;
    }
    .logo-bottom-left .logo-by{font-weight:700;font-size:20px;line-height:1;font-family:'Pacifico',cursive;}
    .logo-bottom-left .logo-cn,.logo-bottom-left .logo-en{font-size:20px;line-height:1;}
    .logo-bottom-left .logo-cn{font-weight:700;font-family:"Noto Serif SC","Songti SC","STSong",serif;}
    .logo-bottom-left .logo-en{font-weight:700;font-family:'Pacifico',cursive;}
    .logo-bottom-left .logo-dot{width:8px;height:8px;border-radius:999px;background:linear-gradient(135deg,#6366f1,#22c55e)}
    .muted{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div id="topbar-nav">
    <a href="index.html" class="btn" style="text-decoration:none;" id="navHome">回到主页</a>
  </div>

  <div class="langbar" style="display:none;">
    <button class="btn" id="langToggle" type="button">EN</button>
  </div>

  <div class="wrap">
    <header class="site-header">
      <div class="title"><h1 id="pageTitle">奇幻梦工厂隐藏关</h1></div>
      <div class="tools"><span class="muted" id="pageHint">点击图片可在新窗口查看原图</span></div>
    </header>

    <main class="main">
      <div class="card">
        <div class="preview">
          <a href="images/qihuan.jpg" target="_blank" rel="noopener">
            <img src="images/qihuan.jpg" alt="奇幻梦工厂隐藏关参考图" id="previewImg" />
          </a>
        </div>
      </div>
    </main>
  </div>

  <div class="logo-bottom-left">
    <span class="logo-dot"></span>
    <span class="logo-by">By</span>
    <span class="logo-cn">国风*</span>
    <span class="logo-en">ShinE</span>
  </div>

  <script>
    (function () {
      const langToggle = document.getElementById('langToggle');
      const navHome = document.getElementById('navHome');
      const navFlip = document.getElementById('navFlip');
      const navCore = document.getElementById('navCore');
      const navStar = document.getElementById('navStar');
      const pageTitle = document.getElementById('pageTitle');
      const pageHint = document.getElementById('pageHint');
      const previewImg = document.getElementById('previewImg');
      const topbarNav = document.getElementById('topbar-nav');

      const I18N = {
        zh: {
          title: '奇幻梦工厂隐藏关 · ShinE',
          nav_label: '页面导航',
          nav_home: '回到主页',
          nav_flip: '九宫格翻牌',
          nav_core: '核心计算器',
          nav_star: '星钻计算器',
          page_title: '奇幻梦工厂隐藏关',
          page_hint: '点击图片可在新窗口查看原图',
          img_alt: '奇幻梦工厂隐藏关参考图',
          lang_toggle_en: 'EN',
          lang_toggle_zh: '中文'
        },
        en: {
          title: 'Fantasy Factory Secret Stage · ShinE',
          nav_label: 'Page Navigation',
          nav_home: 'Home',
          nav_flip: '3x3 Flip Cards',
          nav_core: 'Core Calculator',
          nav_star: 'Star Diamond Calculator',
          page_title: 'Fantasy Factory Secret Stage',
          page_hint: 'Click the image to open the original in a new tab',
          img_alt: 'Fantasy Factory secret stage reference',
          lang_toggle_en: 'EN',
          lang_toggle_zh: '中文'
        }
      };

      let currentLang = (localStorage.getItem('flipgame_lang') || '').toLowerCase();
      if (currentLang !== 'zh' && currentLang !== 'en') {
        const navLang = (navigator.language || '').toLowerCase();
        currentLang = navLang.startsWith('zh') ? 'zh' : 'en';
      }

      function t(key) {
        return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || '';
      }

      function setStaticText() {
        document.title = t('title');
        document.documentElement.lang = currentLang === 'zh' ? 'zh' : 'en';
        if (topbarNav) topbarNav.setAttribute('aria-label', t('nav_label'));
        if (navHome) navHome.textContent = t('nav_home');
        if (navFlip) navFlip.textContent = t('nav_flip');
        if (navCore) navCore.textContent = t('nav_core');
        if (navStar) navStar.textContent = t('nav_star');
        if (pageTitle) pageTitle.textContent = t('page_title');
        if (pageHint) pageHint.textContent = t('page_hint');
        if (previewImg) previewImg.setAttribute('alt', t('img_alt'));
        if (langToggle) langToggle.textContent = currentLang === 'zh' ? t('lang_toggle_en') : t('lang_toggle_zh');
      }

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('flipgame_lang', lang);
        setStaticText();
      }

      if (langToggle) {
        langToggle.addEventListener('click', () => {
          setLang(currentLang === 'zh' ? 'en' : 'zh');
        });
      }

      function enableAppSwipeHome() {
        const isAppMode = (
          (window.matchMedia && (
            window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches
          )) ||
          window.navigator.standalone === true
        );
        if (!isAppMode) return;
        const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!hasTouch) return;
        if (navHome) navHome.style.display = 'none';
        if (topbarNav) topbarNav.style.display = 'none';
        let startX = 0;
        let startY = 0;
        let active = false;
        document.addEventListener('touchstart', (event) => {
          if (!event.touches || event.touches.length !== 1) return;
          startX = event.touches[0].clientX;
          startY = event.touches[0].clientY;
          active = true;
        }, { passive: true });
        document.addEventListener('touchend', (event) => {
          if (!active || !event.changedTouches || !event.changedTouches.length) return;
          active = false;
          const dx = event.changedTouches[0].clientX - startX;
          const dy = event.changedTouches[0].clientY - startY;
          if (Math.abs(dx) >= 80 && Math.abs(dy) <= 50) {
            window.location.href = 'index.html';
          }
        }, { passive: true });
      }

      enableAppSwipeHome();
      setStaticText();
    })();
  </script>
</body>
</html>
