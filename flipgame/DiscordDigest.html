<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>放置奇兵兑换码 · ShinE</title>
  <script>
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      var isStage = host === 'stage' || host.startsWith('stage.') || host.startsWith('stage-') || host.startsWith('stage--') || host.indexOf('--stage') !== -1 || host.indexOf('-stage.') !== -1;
      var svg = isLocal ? 'assets/local-logo.svg' : (isStage ? 'assets/stage-logo.svg' : 'assets/shine-logo.svg');
      var png32 = isLocal ? 'assets/local-logo-32.png' : (isStage ? 'assets/stage-logo-32.png' : 'assets/shine-logo-32.png');
      var ico = isLocal ? 'assets/local-favicon.ico' : (isStage ? 'assets/stage-favicon.ico' : 'assets/favicon.ico');
      var apple = isLocal ? 'assets/local-logo-180.png' : (isStage ? 'assets/stage-logo-180.png' : 'assets/shine-logo-180.png');
      var manifest = isLocal ? 'site.local.webmanifest' : (isStage ? 'site.stage.webmanifest' : 'site.webmanifest');
      var theme = isLocal ? '#fb7185' : (isStage ? '#0891b2' : '#18202a');
      document.write('<link rel="icon" type="image/svg+xml" href="' + svg + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="' + png32 + '">');
      document.write('<link rel="shortcut icon" href="' + ico + '">');
      document.write('<link rel="apple-touch-icon" sizes="180x180" href="' + apple + '">');
      document.write('<link rel="manifest" href="' + manifest + '">');
      document.write('<meta name="theme-color" content="' + theme + '">');
    })();
  </script>
  <style>
    :root {
      --bg: #eef1ed;
      --paper: #fffdf8;
      --ink: #18202a;
      --muted: #66717e;
      --line: #cfd6ce;
      --accent: #146c63;
      --accent-strong: #0f514b;
      --danger: #b42318;
      --radius: 8px;
      --shadow: 0 18px 44px rgba(24, 32, 42, 0.13);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(24, 32, 42, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(24, 32, 42, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }
    body {
      display: flex;
      justify-content: center;
    }
    nav#topbar-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 80;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: 0 10px 26px rgba(24, 32, 42, 0.12);
      backdrop-filter: saturate(140%) blur(8px);
    }
    nav#topbar-nav a {
      border: 1px solid rgba(20, 108, 99, 0.24);
      background: var(--paper);
      color: var(--accent-strong);
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .wrap {
      width: min(980px, 100%);
      min-height: 100vh;
      padding: 74px clamp(16px, 4vw, 34px) 28px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }
    .page-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: end;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--ink);
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 54px);
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 900;
    }
    .lede {
      margin: 9px 0 0;
      color: var(--muted);
      max-width: 720px;
      font-size: 15px;
    }
    .toolbar {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .status {
      color: var(--muted);
      font-size: 14px;
      min-height: 22px;
    }
    .status.error { color: var(--danger); }
    .feed {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .code-card {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 8px 8px 0 rgba(49, 91, 125, 0.14);
      overflow: hidden;
    }
    .code-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      background: #f6f7f2;
      color: var(--muted);
      font-size: 13px;
    }
    .author {
      color: var(--ink);
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .code-text {
      padding: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 15px;
      line-height: 1.6;
    }
    .code-text a {
      color: var(--accent-strong);
      font-weight: 800;
    }
    .image-list {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }
    .feed-image {
      display: block;
      width: min(560px, 100%);
      max-height: 520px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
    }
    .empty {
      border: 2px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.76);
      color: var(--muted);
      padding: 26px;
      text-align: center;
    }
    @media (max-width: 720px) {
      nav#topbar-nav {
        position: static;
        margin: 10px 10px 0 auto;
      }
      body {
        display: block;
      }
      .wrap {
        padding-top: 18px;
      }
      .page-head {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav id="topbar-nav" aria-label="页面导航">
    <a href="index.html" id="navHome">回到主页</a>
  </nav>

  <main class="wrap" id="appShell">
    <header class="page-head">
      <div>
        <h1 id="pageTitle">放置奇兵兑换码</h1>
        <p class="lede" id="pageDesc">及时更新放置奇兵兑换码。</p>
      </div>
    </header>

    <section class="toolbar" aria-label="更新状态">
      <div class="status" id="statusText" role="status">等待刷新。</div>
    </section>

    <section class="feed" id="feed" aria-live="polite">
      <div class="empty">正在读取兑换码。</div>
    </section>
  </main>

  <script>
    (function () {
      const navHome = document.getElementById('navHome');
      const pageTitle = document.getElementById('pageTitle');
      const pageDesc = document.getElementById('pageDesc');
      const statusText = document.getElementById('statusText');
      const feed = document.getElementById('feed');
      const REFRESH_MS = 60 * 60 * 1000;
      const DEFAULT_LIMIT = 12;

      const I18N = {
        zh: {
          title: '放置奇兵兑换码 · ShinE',
          nav_label: '页面导航',
          nav_home: '回到主页',
          page_title: '放置奇兵兑换码',
          page_desc: '及时更新放置奇兵兑换码。',
          idle: '等待刷新。',
          loading: '正在读取 Discord 频道…',
          empty: '暂时没有可显示的文字消息。',
          start: '正在读取兑换码。',
          updated_tpl: '已更新：{time}',
          next_tpl: '下次刷新：{time}',
          config_missing: 'Discord 订阅尚未配置频道和 Bot token。'
        },
        en: {
          title: 'Idle Heroes Codes · ShinE',
          nav_label: 'Page Navigation',
          nav_home: 'Home',
          page_title: 'Idle Heroes Codes',
          page_desc: 'Timely updates for Idle Heroes codes.',
          idle: 'Waiting.',
          loading: 'Loading Discord channel…',
          empty: 'No text messages to show yet.',
          start: 'Loading codes.',
          updated_tpl: 'Updated: {time}',
          next_tpl: 'Next refresh: {time}',
          config_missing: 'Discord channel and bot token are not configured yet.'
        }
      };

      let currentLang = (localStorage.getItem('flipgame_lang') || '').toLowerCase();
      if (currentLang !== 'zh' && currentLang !== 'en') {
        const navLang = (navigator.language || '').toLowerCase();
        currentLang = navLang.startsWith('zh') ? 'zh' : 'en';
      }

      function t(key) {
        return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || '';
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      function renderText(value) {
        return escapeHtml(value).replace(/https?:\/\/[^\s<>"']+/g, (url) => (
          `<a href="${url}" target="_blank" rel="noopener">${url}</a>`
        ));
      }

      function formatTime(value) {
        if (!value) return '';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }).format(date);
      }

      function setStaticText() {
        document.title = t('title');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : 'en';
        if (navHome) navHome.textContent = t('nav_home');
        const topbar = document.getElementById('topbar-nav');
        if (topbar) topbar.setAttribute('aria-label', t('nav_label'));
        if (pageTitle) pageTitle.textContent = t('page_title');
        if (pageDesc) pageDesc.textContent = t('page_desc');
        if (statusText && statusText.dataset.state === 'idle') statusText.textContent = t('idle');
      }

      function setStatus(message, type) {
        statusText.dataset.state = type || '';
        statusText.className = `status${type === 'error' ? ' error' : ''}`;
        statusText.textContent = message;
      }

      function renderEmpty(message) {
        feed.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
      }

      function renderMessages(messages) {
        if (!messages.length) {
          renderEmpty(t('empty'));
          return;
        }
        feed.innerHTML = messages.map((message) => `
          <article class="code-card">
            <div class="code-head">
              <span class="author">${escapeHtml(message.author || 'Discord')}</span>
              <time datetime="${escapeHtml(message.timestamp)}">${escapeHtml(formatTime(message.timestamp))}</time>
            </div>
            ${message.text ? `<div class="code-text">${renderText(message.text)}</div>` : ''}
            ${Array.isArray(message.images) && message.images.length ? `
              <div class="image-list">
                ${message.images.map((image) => `
                  <a href="${escapeHtml(image.url)}" target="_blank" rel="noopener">
                    <img class="feed-image" src="${escapeHtml(image.proxyUrl || image.url)}" alt="${escapeHtml(image.filename || '')}">
                  </a>
                `).join('')}
              </div>
            ` : ''}
          </article>
        `).join('');
      }

      async function loadFeed() {
        setStatus(t('loading'));
        try {
          const response = await fetch(`/api/discord-feed?limit=${DEFAULT_LIMIT}`);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const message = data && data.setupRequired ? t('config_missing') : (data.error || 'Request failed');
            setStatus(message, 'error');
            renderEmpty(message);
            return;
          }
          renderMessages(Array.isArray(data.messages) ? data.messages : []);
          const updated = t('updated_tpl').replace('{time}', formatTime(data.fetchedAt) || '');
          const next = t('next_tpl').replace('{time}', formatTime(data.cacheExpiresAt || Date.now() + REFRESH_MS) || '');
          setStatus(`${updated} · ${next}`);
        } catch (error) {
          const message = error && error.message ? error.message : 'Request failed';
          setStatus(message, 'error');
          renderEmpty(message);
        }
      }

      setStaticText();
      renderEmpty(t('start'));
      loadFeed();
      setInterval(loadFeed, REFRESH_MS);
    })();
  </script>
</body>
</html>
