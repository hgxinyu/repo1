      document.write('<meta name="theme-color" content="' + theme + '">');

  <style>
    :root {
      --ink: #10201c;
      --muted: #65756f;
      --line: #d8e4de;
      --paper: #fffdf7;
      --wash: #f8fafc;
      --brand: #0f766e;
      --brand-2: #b45309;
      --danger: #b91c1c;
      --shadow: 0 18px 40px rgba(16, 32, 28, 0.13);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--wash);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.55;
    }
    body { min-height: 100vh; }
    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px clamp(14px, 3vw, 28px) 34px;
      display: grid;
      gap: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbar a,
    .langbar button {
      border: 1px solid rgba(15, 118, 110, 0.24);
      background: rgba(255, 253, 247, 0.88);
      color: var(--brand);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.08);
    }
    .hero {
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.93);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 34px);
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.7fr);
      gap: 18px;
      align-items: end;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--brand-2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 50px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .intro {
      margin: 12px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 15px;
    }
    .stamp {
      justify-self: end;
      width: min(230px, 100%);
      border: 1px solid rgba(15, 118, 110, 0.22);
      background: rgba(238, 247, 242, 0.84);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .stamp strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.94);
      border-radius: var(--radius);
      box-shadow: 0 12px 28px rgba(16, 32, 28, 0.1);
      padding: clamp(16px, 3vw, 24px);
      display: grid;
      gap: 14px;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-size: clamp(19px, 4vw, 25px);
      letter-spacing: 0;
    }
    .note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    select {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(15, 118, 110, 0.28);
      border-radius: var(--radius);
      background: #fffdf7;
      color: var(--ink);
      padding: 11px 12px;
      font: inherit;
      font-size: 15px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    select:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.24);
      outline-offset: 2px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid rgba(15, 118, 110, 0.18);
      background: rgba(238, 247, 242, 0.72);
      border-radius: var(--radius);
      padding: 12px;
      min-width: 0;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: clamp(18px, 3.5vw, 26px);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .metric .metric-detail {
      margin-top: 6px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .metric.requirement-metric strong {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.35;
    }
    .requirement-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      max-width: 100%;
      padding: 4px 8px;
      border: 1px solid rgba(15, 118, 110, 0.2);
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.78);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf7;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #33443e;
      background: rgba(15, 118, 110, 0.08);
      font-size: 12px;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    td.value {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      white-space: nowrap;
    }
    td.small {
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      border: 1px solid rgba(185, 28, 28, 0.22);
      background: rgba(254, 242, 242, 0.86);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 13px;
    }
    .status:empty { display: none; }
    @media (max-width: 900px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .stamp { justify-self: stretch; }
    }
    @media (max-width: 620px) {
      .summary { grid-template-columns: 1fr; }
      table { min-width: 470px; }
    }
  </style>
</head>
<body>

    </section>

        </div>
        <label for="templeLevel" id="templeLevelLabel">

        </label>
        <div class="summary">
          <div class="metric">
            <span id="currentTempleLabel">当前殿堂</span>
            <strong id="currentTempleValue">-</strong>
            <span class="metric-detail" id="currentTempleDetail">-</span>
          </div>
          <div class="metric">
            <span id="nextTempleLabel">下一殿堂</span>
            <strong id="nextTempleValue">-</strong>
            <span class="metric-detail" id="nextTempleDetail">-</span>
          </div>
          <div class="metric">
            <span id="newHeroLabel">新增英雄</span>
            <strong id="newHeroValue">-</strong>
          </div>
          <div class="metric requirement-metric">
            <span id="targetReqLabel">升级要求</span>
            <strong id="targetReqValue">-</strong>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th id="templeResourceHead">资源</th>
                <th id="templeTotalHead">本次需要</th>
                <th id="templeBreakdownHead">拆分</th>
              </tr>
            </thead>
            <tbody id="templeRows"></tbody>
          </table>
        </div>
        <div class="status" id="templeStatus" role="status"></div>
      </article>
      <article class="panel">
        <div class="panel-head">
          <div>
            <h2 id="heroTitle">单英雄飞升计算</h2>
            <p class="note" id="heroDesc">选择初始等级和目标飞升等级，计算剩余根源、核武、技能点、转时空英雄和飞升段资源。</p>

        </div>
        <label for="heroStart" id="heroStartLabel">
          初始等级
          <select id="heroStart"></select>
        </label>
        <label for="heroDestiny" id="heroDestinyLabel">
          目标飞升等级
          <select id="heroDestiny"></select>
        </label>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th id="heroResourceHead">资源</th>
                <th id="heroTotalHead">总需求</th>
                <th id="heroBreakdownHead">拆分</th>
              </tr>
            </thead>
            <tbody id="heroRows"></tbody>
          </table>
        </div>
        <div class="status" id="heroStatus" role="status"></div>
      </article>
    </section>
  </main>

      let currentLang = (localStorage.getItem('flipgame_lang') || '').toLowerCase();
      if (currentLang !== 'zh' && currentLang !== 'en') {
        currentLang = ((navigator.language || '').toLowerCase().startsWith('zh')) ? 'zh' : 'en';
      }
      function t(key) {
        return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || '';
      }
      function formatInt(value) {
        return Math.round(value).toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
      }
      function formatK(value) {
        return `${formatInt(value)}K`;
      }
      function getLevel(level) {
        return templeData.find((item) => item.templeLevel === level) || null;
      }
      function formatTempleLabel(level) {
        return level === 0 ? t('level_zero') : `${t('level_prefix')}${level}`;
      }
      function formatDivinePower(item) {
        const bonus = item ? Number(item.divinePowerBonus || 0) : 0;
        return `${t('divine_power_formula')}${bonus}`;
      }
      function segmentFlyCost(fromCompletedLevel, targetLevel) {
        if (targetLevel <= fromCompletedLevel) {
          return { auroraGem: 0, scatteredSpiritveinShard: 0, crystalOfTranscendenceK: 0, stellarShards: 0 };
        }
        return FLY_COSTS.slice(fromCompletedLevel, targetLevel).reduce((sum, item) => ({
          auroraGem: sum.auroraGem + item.auroraGem,
          scatteredSpiritveinShard: sum.scatteredSpiritveinShard + item.scatteredSpiritveinShard,
          crystalOfTranscendenceK: sum.crystalOfTranscendenceK + item.crystalOfTranscendenceK,
          stellarShards: sum.stellarShards + item.stellarShards
        }), { auroraGem: 0, scatteredSpiritveinShard: 0, crystalOfTranscendenceK: 0, stellarShards: 0 });
      }
      function getHeroStart(value) {
        return HERO_STARTS.find((item) => item.value === value) || HERO_STARTS[0];
      }
      function formatHeroStart(value) {
        return t(getHeroStart(value).labelKey);
      }
      function resourceRow(label, value, detail, isK) {
        const display = isK ? formatK(value) : formatInt(value);
        return `<tr><td>${label}</td><td class="value">${display}</td><td class="small">${detail}</td></tr>`;
      }
      function resourceTextRow(label, valueText, detail) {
        return `<tr><td>${label}</td><td class="value">${valueText}</td><td class="small">${detail}</td></tr>`;
      }
      function detailOrNone(parts) {
        return parts.length ? parts.join(' + ') : t('none_needed');
      }
      function formatRequirement(requirements) {
        if (!requirements || !requirements.length) return t('requirement_none');
        return requirements.map((item) => `${item.count}${currentLang === 'zh' ? '飞' : 'D'}${item.destinyLevel}`);
      }
      function setRequirement(requirements) {
        const formatted = formatRequirement(requirements);
        if (!Array.isArray(formatted)) {
          targetReqValue.textContent = formatted;
          return;
        }
        targetReqValue.innerHTML = formatted.map((text) => `<span class="requirement-chip">${text}</span>`).join('');
      }
      function setStaticText() {
        document.title = t('title');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : 'en';
        Object.keys(refs).forEach((key) => {
          if (refs[key]) refs[key].textContent = t(key);
        });
        if (langToggle) langToggle.textContent = currentLang === 'zh' ? t('lang_toggle_en') : t('lang_toggle_zh');
        document.getElementById('stampValue').textContent = '5,000K';
      }
      function populateSelects() {
        templeLevelSelect.innerHTML = '';
        const maxCurrent = Math.max(0, templeData.length - 1);
        for (let level = 0; level <= maxCurrent; level += 1) {
          const option = document.createElement('option');
          option.value = String(level);
          option.textContent = level === 0 ? t('level_zero') : `${t('level_prefix')}${level}`;
          templeLevelSelect.appendChild(option);
        }
        heroDestinySelect.innerHTML = '';
        heroStartSelect.innerHTML = '';
        HERO_STARTS.forEach((item) => {
          const option = document.createElement('option');
          option.value = item.value;
          option.textContent = t(item.labelKey);
          heroStartSelect.appendChild(option);
        });
        templeLevelSelect.value = String(Math.min(16, maxCurrent));
        heroStartSelect.value = 'e5';
        updateHeroTargetOptions('6');
      }
      function updateHeroTargetOptions(preferredValue) {
        const start = getHeroStart(heroStartSelect.value);
        const minTarget = Math.min(6, start.completedFly + 1);
        const preferred = Number(preferredValue || heroDestinySelect.value || 6);
        heroDestinySelect.innerHTML = '';
        FLY_COSTS.filter((item) => item.level >= minTarget).forEach((item) => {
          const option = document.createElement('option');
          option.value = String(item.level);
          option.textContent = `${t('destiny_prefix')}${item.level} · ${item.title}`;
          heroDestinySelect.appendChild(option);
        });
        const nextValue = preferred >= minTarget ? Math.min(preferred, 6) : minTarget;
        heroDestinySelect.value = String(nextValue);
      }
      function renderTemple() {
        if (!templeData.length) return;
        const currentLevel = Number(templeLevelSelect.value || 0);
        const next = getLevel(currentLevel + 1);
        const current = getLevel(currentLevel);
        currentTempleValue.textContent = formatTempleLabel(currentLevel);
        currentTempleDetail.textContent = formatDivinePower(current);
        if (!next) {
          templeRows.innerHTML = '';
          nextTempleValue.textContent = '-';
          nextTempleDetail.textContent = '-';
          newHeroValue.textContent = '-';
          targetReqValue.textContent = '-';
          templeStatus.textContent = t('no_next');
          return;
        }
        templeStatus.textContent = '';
        const currentPrereq = current ? current.prerequisites : { stellarShards: 0, spiritualEssence: 0 };
        const currentResources = current ? current.resources : {};
        const currentHeroCount = current ? current.heroCount : 0;
        const prereqStellar = Math.max(0, next.prerequisites.stellarShards - currentPrereq.stellarShards);
        const prereqEssence = Math.max(0, next.prerequisites.spiritualEssence - currentPrereq.spiritualEssence);
        const upgradeStellar = next.resources.stellarShards.total - ((currentResources.stellarShards && currentResources.stellarShards.total) || 0);
        const upgradeAurora = next.resources.auroraGem.total - ((currentResources.auroraGem && currentResources.auroraGem.total) || 0);
        const upgradeSpiritvein = next.resources.scatteredSpiritveinShard.total - ((currentResources.scatteredSpiritveinShard && currentResources.scatteredSpiritveinShard.total) || 0);
        const upgradeCrystalK = next.resources.crystalOfTranscendenceK.total - ((currentResources.crystalOfTranscendenceK && currentResources.crystalOfTranscendenceK.total) || 0);
        const newHeroes = Math.max(0, next.heroCount - currentHeroCount);
        const transCrystalK = newHeroes * HERO_BASE.transcendenceCrystalK;
        nextTempleValue.textContent = formatTempleLabel(next.templeLevel);
        nextTempleDetail.textContent = formatDivinePower(next);
        newHeroValue.textContent = `${formatInt(newHeroes)}${t('hero_count_suffix')}`;
        setRequirement(next.upgradeRequirements);
        templeRows.innerHTML = [
          resourceRow(t('stellar'), prereqStellar + upgradeStellar, `${t('prereq')} ${formatInt(prereqStellar)} + ${t('upgrade')} ${formatInt(upgradeStellar)}`),
          resourceRow(t('essence'), prereqEssence, `${t('prereq')} ${formatInt(prereqEssence)}`),
          resourceRow(t('aurora'), upgradeAurora, `${t('upgrade')} ${formatInt(upgradeAurora)}`),
          resourceRow(t('spiritvein'), upgradeSpiritvein, `${t('upgrade')} ${formatInt(upgradeSpiritvein)}`),
          resourceRow(t('crystal_k'), upgradeCrystalK + transCrystalK, `${t('upgrade')} ${formatK(upgradeCrystalK)} + ${t('trans')} ${formatK(transCrystalK)}`, true)
        ].join('');
      }
      function renderHero() {
        updateHeroTargetOptions(heroDestinySelect.value);
        const start = getHeroStart(heroStartSelect.value);
        const target = Number(heroDestinySelect.value || 1);
        const fly = segmentFlyCost(start.completedFly, target);
        const e9Stellar = start.completedE9 ? 0 : HERO_BASE.e9Stellar;
        const rootStellar = start.completedRoot ? 0 : HERO_BASE.rootStellar;
        const rootEssence = start.completedRoot ? 0 : HERO_BASE.rootEssence;
        const coreBoxes = start.completedRoot ? 0 : HERO_BASE.coreBoxes;
        const coreShards = start.completedRoot ? 0 : HERO_BASE.coreShards;
        const skillPoints = start.completedRoot ? 0 : HERO_BASE.skillPoints;
        const essenceSublimationK = start.completedRoot ? 0 : HERO_BASE.essenceSublimationK;
        const transCrystalK = start.completedTrans ? 0 : HERO_BASE.transcendenceCrystalK;
        heroStatus.textContent = '';
        const stellarParts = [];
        if (e9Stellar) stellarParts.push(`${t('e9')} ${formatInt(e9Stellar)}`);
        if (rootStellar) stellarParts.push(`${t('root')} ${formatInt(rootStellar)}`);
        if (fly.stellarShards) stellarParts.push(`${t('fly')} ${formatInt(fly.stellarShards)}`);
        const crystalParts = [];
        if (transCrystalK) crystalParts.push(`${t('trans')} ${formatK(transCrystalK)}`);
        if (fly.crystalOfTranscendenceK) crystalParts.push(`${t('fly')} ${formatK(fly.crystalOfTranscendenceK)}`);
        heroRows.innerHTML = [
          resourceRow(t('stellar'), e9Stellar + rootStellar + fly.stellarShards, detailOrNone(stellarParts)),
          resourceRow(t('essence'), rootEssence, rootEssence ? `${t('root')} ${formatInt(rootEssence)}` : t('none_needed')),
          resourceTextRow(t('core_boxes_shards'), `${formatInt(coreBoxes)}/${formatInt(coreShards)}`, coreBoxes ? t('boxes_shards') : t('none_needed')),
          resourceTextRow(t('sublimation_k'), `${formatInt(skillPoints)}/${formatK(essenceSublimationK)}`, skillPoints ? t('skills') : t('none_needed')),
          resourceRow(t('aurora'), fly.auroraGem, fly.auroraGem ? `${t('fly')} ${formatInt(fly.auroraGem)}` : t('none_needed')),
          resourceRow(t('spiritvein'), fly.scatteredSpiritveinShard, fly.scatteredSpiritveinShard ? `${t('fly')} ${formatInt(fly.scatteredSpiritveinShard)}` : t('none_needed')),
          resourceRow(t('crystal_k'), transCrystalK + fly.crystalOfTranscendenceK, detailOrNone(crystalParts), true)
        ].join('');
      }
      function rerender() {
        setStaticText();
        if (templeData.length) {
          const templeValue = templeLevelSelect.value || '0';
          const startValue = heroStartSelect.value || 'e5';
          const heroValue = heroDestinySelect.value || '6';
          populateSelects();
          templeLevelSelect.value = templeValue;
          heroStartSelect.value = startValue;
          updateHeroTargetOptions(heroValue);
          renderTemple();
          renderHero();
        }
      }
      templeLevelSelect.addEventListener('change', renderTemple);
      heroStartSelect.addEventListener('change', () => {
        updateHeroTargetOptions(heroDestinySelect.value);
        renderHero();
      });
      heroDestinySelect.addEventListener('change', renderHero);
      if (langToggle) {
        langToggle.addEventListener('click', () => {
          currentLang = currentLang === 'zh' ? 'en' : 'zh';
          localStorage.setItem('flipgame_lang', currentLang);
          rerender();
        });
      }
      setStaticText();
      fetch('destiny_temple_levels.json')
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        })
        .then((data) => {
          templeData = Array.isArray(data.levels) ? data.levels : [];
          populateSelects();
          renderTemple();
          renderHero();
        })
        .catch(() => {
          templeStatus.textContent = t('data_fail');
          heroStatus.textContent = t('data_fail');
        });
    })();
  </script>
</body>
</html>
