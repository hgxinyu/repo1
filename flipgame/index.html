<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>放置工具集 · ShinE</title>
  <link rel="icon" type="image/svg+xml" href="assets/shine-logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/shine-logo-32.png">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/shine-logo-180.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#6366f1">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --radius: 18px;
      --border: #e2e8f0;
      --ink: #0f172a;
      --muted: #64748b;
      --brand: #6366f1;
      --surface: #ffffff;
      --bg: #f8fafc;
      --shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrap {
      width: min(960px, 100%);
      padding: clamp(28px, 6vw, 56px) clamp(18px, 5vw, 48px) 88px;
      display: flex;
      flex-direction: column;
      gap: clamp(24px, 6vw, 40px);
      flex: 1 0 auto;
    }
    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 44px);
      letter-spacing: 0.04em;
    }
    header p {
      margin: 0 auto;
      max-width: 520px;
      font-size: clamp(14px, 4vw, 16px);
      color: var(--muted);
    }
    .langbar {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      backdrop-filter: saturate(140%) blur(4px);
    }
    .langbar .lang-btn {
      border: 1px solid rgba(99, 102, 241, 0.35);
      background: #fff;
      color: var(--brand);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.2px;
    }
    .langbar .help-link {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: clamp(16px, 4vw, 28px);
    }
    .card-link {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: clamp(18px, 4vw, 26px);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: var(--ink);
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .card-link span.title {
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 600;
    }
    .card-link span.subtitle {
      color: var(--muted);
      font-size: clamp(13px, 4vw, 15px);
    }
    .card-link:hover,
    .card-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.35);
      box-shadow: 0 18px 36px rgba(99, 102, 241, 0.25);
      outline: none;
    }
    .card-link:focus-visible {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    .card-link.card-button {
      width: 100%;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .logo-bottom-right {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      font-size: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: #111827;
    }
    .logo-bottom-right .logo-by {
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-right .logo-cn,
    .logo-bottom-right .logo-en {
      font-size: 20px;
      line-height: 1;
    }
    .logo-bottom-right .logo-cn {
      font-weight: 700;
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
    }
    .logo-bottom-right .logo-en {
      font-weight: 700;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-right .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
    }
    .feedback-toggle {
      position: fixed;
      right: 18px;
      bottom: 96px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.95), rgba(59, 130, 246, 0.95));
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: 0 20px 36px rgba(79, 70, 229, 0.35);
      cursor: pointer;
      font-size: 15px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .feedback-toggle span.icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      font-size: 13px;
    }
    .feedback-panel {
      position: fixed;
      right: 16px;
      bottom: 170px;
      width: min(340px, calc(100% - 32px));
      max-height: 72vh;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.28);
      padding: 22px 22px 18px;
      display: none;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      z-index: 20;
    }
    .recruit-panel {
      position: fixed;
      right: 16px;
      bottom: 170px;
      width: min(380px, calc(100% - 32px));
      max-height: 72vh;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.28);
      padding: 22px 22px 18px;
      display: none;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      z-index: 21;
    }
    .recruit-panel header {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .recruit-panel header h2 {
      margin: 0;
      font-size: 18px;
    }
    .recruit-panel header p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .recruit-panel form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .recruit-panel label {
      font-size: 13px;
      color: var(--muted);
    }
    .recruit-panel input,
    .recruit-panel textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(148, 163, 184, 0.16);
    }
    .recruit-panel textarea {
      min-height: 110px;
      resize: vertical;
    }
    .recruit-panel button[type="submit"] {
      margin-top: 6px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.95), rgba(16, 185, 129, 0.95));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(16, 185, 129, 0.28);
      transition: transform 0.2s ease;
    }
    .recruit-panel button[type="submit"]:hover {
      transform: translateY(-1px);
    }
    .recruit-panel .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }
    .recruit-panel .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
    }
    .feedback-panel header {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .feedback-panel header h2 {
      margin: 0;
      font-size: 18px;
    }
    .feedback-panel header p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .feedback-panel form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .feedback-panel label {
      font-size: 13px;
      color: var(--muted);
    }
    .feedback-panel input,
    .feedback-panel textarea,
    .feedback-panel select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(148, 163, 184, 0.16);
    }
    .feedback-panel textarea {
      min-height: 120px;
      resize: vertical;
    }
    .feedback-panel button[type="submit"] {
      margin-top: 6px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.95), rgba(67, 56, 202, 0.95));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(67, 56, 202, 0.32);
      transition: transform 0.2s ease;
    }
    .feedback-panel button[type="submit"]:hover {
      transform: translateY(-1px);
    }
    .feedback-panel .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }
    .feedback-panel .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
    }
    footer {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding-bottom: 24px;
    }
    @media (max-width: 560px) {
      html, body {
        font-size: 15px;
      }
      .wrap {
        padding-top: 40px;
        padding-bottom: 72px;
      }
      .logo-bottom-right {
        position: static;
        margin: 32px auto 12px;
      }
      .feedback-toggle {
        right: 16px;
        bottom: 16px;
      }
      .feedback-panel {
        right: 16px;
        left: 16px;
        bottom: 96px;
        width: auto;
      }
      .recruit-panel {
        right: 16px;
        left: 16px;
        bottom: 96px;
        width: auto;
      }
    }
    @media (display-mode: standalone), (display-mode: fullscreen) {
      .langbar {
        right: 8px;
        top: 6px;
      }
      .wrap {
        padding-top: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="langbar">
    <a class="lang-btn help-link" id="helpLink" href="AppBuildGuide.html">安装APP帮助</a>
    <button class="lang-btn" id="langToggle" type="button">EN</button>
  </div>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">放置工具集</h1>
      <p id="pageDesc">自用的放置类工具合集，涵盖九宫格翻牌、核心换算、星钻计算和凝魂升格等功能。</p>
    </header>

    <nav class="card-grid" aria-label="工具导航" id="navGrid">
      <a class="card-link" href="flipgame.html">
        <span class="title" id="cardFlipTitle">九宫格翻牌</span>
        <span class="subtitle" id="cardFlipSub">模拟翻牌流程，记录并计算最佳组合。</span>
      </a>
      <a class="card-link" href="CoreCalculator.html">
        <span class="title" id="cardCoreTitle">核心计算器</span>
        <span class="subtitle" id="cardCoreSub">输入各资源数量，一键估算总核心需求。</span>
      </a>
      <a class="card-link" href="StarDiamondCalculator.html">
        <span class="title" id="cardStarTitle">星钻计算器</span>
        <span class="subtitle" id="cardStarSub">按比例换算金额与赠送额度。</span>
      </a>
      <a class="card-link" href="奇幻梦工厂隐藏关.html">
        <span class="title" id="cardHiddenTitle">奇幻梦工厂隐藏关</span>
        <span class="subtitle" id="cardHiddenSub">隐藏关卡资料与攻略整理。</span>
      </a>
      <a class="card-link" href="SoulAscensionCalculator.html">
        <span class="title" id="cardSoulTitle">凝魂升格计算器</span>
        <span class="subtitle" id="cardSoulSub">检验属性区间并估算升级次数。</span>
      </a>
      <a class="card-link" href="SoulPowerCalculator.html">
        <span class="title" id="cardPowerTitle">魂力计算器</span>
        <span class="subtitle" id="cardPowerSub">根据三维均值和资质区间估算魂力值。</span>
      </a>
      <button class="card-link card-button" id="recruitCard" type="button">
        <span class="title" id="cardRecruitTitle">公会招募</span>
        <span class="subtitle" id="cardRecruitSub">欢迎加入 iOS 国风大家庭，点击填写招募信息。</span>
      </button>
    </nav>
  </div>

  <button class="feedback-toggle" id="feedbackToggle" type="button">
    <span class="icon">✉</span> <span id="feedbackToggleText">反馈建议</span>
  </button>

  <section class="feedback-panel" id="feedbackPanel" aria-hidden="true">
    <button class="close-btn" type="button" aria-label="关闭反馈面板" id="feedbackClose">×</button>
    <header>
      <h2 id="feedbackTitle">反馈中心</h2>
      <p id="feedbackDesc">欢迎留言提供建议或问题反馈。</p>
    </header>
    <form id="feedbackForm" autocomplete="on">
      <label for="fbTopic" id="fbTopicLabel">反馈类型</label>
      <select id="fbTopic" name="topic" required>
        <option value="建议" id="fbTopicOptSuggestion">建议</option>
        <option value="问题" id="fbTopicOptIssue">问题反馈</option>
        <option value="其他" id="fbTopicOptOther">其他</option>
      </select>

      <label for="fbDetail" id="fbDetailLabel">详细描述</label>
      <textarea id="fbDetail" name="detail" placeholder="请输入具体情况…" required></textarea>

      <label for="fbContact" id="fbContactLabel">联系方式或放置ID（必填）</label>
      <input id="fbContact" name="contact" type="text" placeholder="请输入邮箱或微信或放置ID" required />

      <button type="submit" id="fbSubmit">发送反馈</button>
      <div class="status" id="fbStatus" role="status"></div>
    </form>
  </section>

  <section class="recruit-panel" id="recruitPanel" aria-hidden="true">
    <button class="close-btn" type="button" aria-label="关闭招募面板" id="recruitClose">×</button>
    <header>
      <h2 id="recruitTitle">iOS国风公会招募</h2>
      <p id="recruitDesc">欢迎加入 iOS 国风大家庭，提交信息后会尽快联系你。</p>
    </header>
    <form id="recruitForm" autocomplete="on">
      <label for="recruitAccount" id="recruitAccountLabel">账号概况（飞升/星魂/灌注/PVP-PVE）</label>
      <textarea id="recruitAccount" name="account_summary" placeholder="例如：飞升15，求知20，圣焰24，灌注12，主C暗战A，主玩PVE" required></textarea>

      <label for="recruitWechat" id="recruitWechatLabel">微信ID</label>
      <input id="recruitWechat" name="wechat_id" type="text" placeholder="请输入微信ID" required />

      <label for="recruitGameId" id="recruitGameIdLabel">游戏ID</label>
      <input id="recruitGameId" name="game_id" type="text" placeholder="请输入游戏ID" required />

      <button type="submit" id="recruitSubmit">提交招募信息</button>
      <div class="status" id="recruitStatus" role="status"></div>
    </form>
  </section>

  <div class="logo-bottom-right">
    <span class="logo-dot"></span>
    <span class="logo-by">By</span>
    <span class="logo-cn">国风*</span>
    <span class="logo-en">ShinE</span>
  </div>

  <footer>
  </footer>

          status_success: 'Thanks for your feedback! We will review it soon.',
          status_verify: 'First-time use requires FormSubmit email verification. Check your inbox or spam folder.',
          status_captcha: 'Too many requests. Please try again later.',
          status_fail_prefix: 'Failed: ',
          status_fail_generic: 'Failed. Please try again later or contact us directly.',
          lang_toggle_en: 'EN',
          lang_toggle_zh: '中文'
        }
      };

      let currentLang = (localStorage.getItem('flipgame_lang') || '').toLowerCase();
      if (currentLang !== 'zh' && currentLang !== 'en') {
        const navLang = (navigator.language || '').toLowerCase();
        currentLang = navLang.startsWith('zh') ? 'zh' : 'en';
      }

      function t(key) {
        return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || '';
      }

      function setStaticText() {
        document.title = t('title');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : 'en';
        if (pageTitle) pageTitle.textContent = t('page_title');
        if (pageDesc) pageDesc.textContent = t('page_desc');
        if (helpLink) helpLink.textContent = t('help_link');
        if (navGrid) navGrid.setAttribute('aria-label', t('nav_label'));
        if (cardFlipTitle) cardFlipTitle.textContent = t('card_flip_title');
        if (cardFlipSub) cardFlipSub.textContent = t('card_flip_sub');
        if (cardCoreTitle) cardCoreTitle.textContent = t('card_core_title');
        if (cardCoreSub) cardCoreSub.textContent = t('card_core_sub');
        if (cardStarTitle) cardStarTitle.textContent = t('card_star_title');
        if (cardStarSub) cardStarSub.textContent = t('card_star_sub');
        if (cardHiddenTitle) cardHiddenTitle.textContent = t('card_hidden_title');
        if (cardHiddenSub) cardHiddenSub.textContent = t('card_hidden_sub');
        if (cardSoulTitle) cardSoulTitle.textContent = t('card_soul_title');
        if (cardSoulSub) cardSoulSub.textContent = t('card_soul_sub');
        if (cardPowerTitle) cardPowerTitle.textContent = t('card_power_title');
        if (cardPowerSub) cardPowerSub.textContent = t('card_power_sub');
        if (cardRecruitTitle) cardRecruitTitle.textContent = t('card_recruit_title');
        if (cardRecruitSub) cardRecruitSub.textContent = t('card_recruit_sub');
        if (feedbackToggleText) feedbackToggleText.textContent = t('feedback_toggle');
        if (feedbackTitle) feedbackTitle.textContent = t('feedback_title');
        if (feedbackDesc) feedbackDesc.textContent = t('feedback_desc');
        if (fbTopicLabel) fbTopicLabel.textContent = t('fb_topic_label');
        if (fbTopicOptSuggestion) { fbTopicOptSuggestion.textContent = t('fb_topic_suggestion'); fbTopicOptSuggestion.value = t('fb_topic_suggestion'); }
        if (fbTopicOptIssue) { fbTopicOptIssue.textContent = t('fb_topic_issue'); fbTopicOptIssue.value = t('fb_topic_issue'); }
        if (fbTopicOptOther) { fbTopicOptOther.textContent = t('fb_topic_other'); fbTopicOptOther.value = t('fb_topic_other'); }
        if (fbDetailLabel) fbDetailLabel.textContent = t('fb_detail_label');
        if (fbDetail) fbDetail.setAttribute('placeholder', t('fb_detail_placeholder'));
        if (fbContactLabel) fbContactLabel.textContent = t('fb_contact_label');
        if (fbContact) fbContact.setAttribute('placeholder', t('fb_contact_placeholder'));
        if (fbSubmit) fbSubmit.textContent = t('fb_submit');
        if (feedbackClose) feedbackClose.setAttribute('aria-label', t('fb_close_label'));
        if (recruitTitle) recruitTitle.textContent = t('recruit_title');
        if (recruitDesc) recruitDesc.textContent = t('recruit_desc');
        if (recruitAccountLabel) recruitAccountLabel.textContent = t('recruit_account_label');
        if (recruitAccount) recruitAccount.setAttribute('placeholder', t('recruit_account_placeholder'));
        if (recruitWechatLabel) recruitWechatLabel.textContent = t('recruit_wechat_label');
        if (recruitWechat) recruitWechat.setAttribute('placeholder', t('recruit_wechat_placeholder'));
        if (recruitGameIdLabel) recruitGameIdLabel.textContent = t('recruit_gameid_label');
        if (recruitGameId) recruitGameId.setAttribute('placeholder', t('recruit_gameid_placeholder'));
        if (recruitSubmit) recruitSubmit.textContent = t('recruit_submit');
        if (recruitClose) recruitClose.setAttribute('aria-label', t('recruit_close_label'));
        if (langToggle) langToggle.textContent = currentLang === 'zh' ? t('lang_toggle_en') : t('lang_toggle_zh');
      }

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('flipgame_lang', lang);
        setStaticText();
      }

      function setPanel(open) {
        panel.style.display = open ? 'flex' : 'none';
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open) {
          panel.querySelector('textarea').focus();
        }
      }
      function setRecruitPanel(open) {
        recruitPanel.style.display = open ? 'flex' : 'none';
        recruitPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open) {
          recruitPanel.querySelector('textarea').focus();
        }
      }

      toggle.addEventListener('click', () => {
        const isHidden = panel.getAttribute('aria-hidden') !== 'false';
        setPanel(isHidden);
      });

      closeBtn.addEventListener('click', () => setPanel(false));
      recruitCard.addEventListener('click', () => {
        setPanel(false);
        setRecruitPanel(true);
      });
      recruitClose.addEventListener('click', () => setRecruitPanel(false));

      const isAppMode = (() => {
        const standalone = window.matchMedia && (
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches
        );
        return standalone || window.navigator.standalone === true;
      })();
      if (isAppMode) {
        document.addEventListener('pointerdown', (event) => {
          const target = event.target;
          const feedbackOpen = panel.getAttribute('aria-hidden') === 'false';
          const recruitOpen = recruitPanel.getAttribute('aria-hidden') === 'false';
          if (feedbackOpen && !panel.contains(target) && !toggle.contains(target)) {
            setPanel(false);
          }
          if (recruitOpen && !recruitPanel.contains(target) && !recruitCard.contains(target)) {
            setRecruitPanel(false);
          }
        });
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          setPanel(false);
          setRecruitPanel(false);
        }
      });

      function decodeEndpoint() {
        const encoded = 'Z3JlZW50aGVzaGluZUBnbWFpbC5jb20=';
        return atob(encoded);
      }

      async function submitFeedback(formData) {
        const email = decodeEndpoint();
        const endpoint = `https://formsubmit.co/ajax/${encodeURIComponent(email)}`;
        formData.append('_subject', `工具站反馈 - ${formData.get('topic')}`);
        formData.append('_template', 'table');
        return fetch(endpoint, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: formData
        });
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusEl.textContent = t('status_sending');

        const formData = new FormData(form);
        formData.append('_honey', '');
        formData.append('_captcha', 'false');

        try {
          const response = await submitFeedback(formData);
          const contentType = (response.headers.get('content-type') || '').toLowerCase();
          let data = null;
          let rawText = '';

          if (contentType.includes('application/json')) {
            data = await response.json();
          } else {
            rawText = await response.text();
            try {
              data = rawText ? JSON.parse(rawText) : null;
            } catch (parseErr) {
              // 非 JSON响应忽略解析错误
            }
          }

          const success = data && String(data.success).toLowerCase() === 'true';
          if (response.ok && success) {
            statusEl.textContent = t('status_success');
            form.reset();
            setTimeout(() => {
              statusEl.textContent = '';
              setPanel(false);
            }, 2000);
            return;
          }

          const detail = (data && (data.message || data.error)) || rawText || `HTTP ${response.status}`;
          throw new Error(detail);
        } catch (error) {
          const fullMessage = String(error && error.message ? error.message : error || '').trim();
          const message = fullMessage.toLowerCase();
          if (message.includes('verify') || message.includes('confirmation')) {
            statusEl.textContent = t('status_verify');
          } else if (message.includes('captcha')) {
            statusEl.textContent = t('status_captcha');
          } else if (fullMessage) {
            statusEl.textContent = t('status_fail_prefix') + fullMessage;
          } else {
            statusEl.textContent = t('status_fail_generic');
          }
        }
      });

      recruitForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        recruitStatus.textContent = t('status_sending');

        const formData = new FormData(recruitForm);
        formData.append('_honey', '');
        formData.append('_captcha', 'false');
        formData.append('topic', currentLang === 'zh' ? '公会招募' : 'Guild Recruitment');

        try {
          const response = await submitFeedback(formData);
          const contentType = (response.headers.get('content-type') || '').toLowerCase();
          let data = null;
          let rawText = '';
          if (contentType.includes('application/json')) {
            data = await response.json();
          } else {
            rawText = await response.text();
            try {
              data = rawText ? JSON.parse(rawText) : null;
            } catch (parseErr) {
            }
          }

          const success = data && String(data.success).toLowerCase() === 'true';
          if (response.ok && success) {
            recruitStatus.textContent = t('status_success');
            recruitForm.reset();
            setTimeout(() => {
              recruitStatus.textContent = '';
              setRecruitPanel(false);
            }, 2000);
            return;
          }

          const detail = (data && (data.message || data.error)) || rawText || `HTTP ${response.status}`;
          throw new Error(detail);
        } catch (error) {
          const fullMessage = String(error && error.message ? error.message : error || '').trim();
          const message = fullMessage.toLowerCase();
          if (message.includes('verify') || message.includes('confirmation')) {
            recruitStatus.textContent = t('status_verify');
          } else if (message.includes('captcha')) {
            recruitStatus.textContent = t('status_captcha');
          } else if (fullMessage) {
            recruitStatus.textContent = t('status_fail_prefix') + fullMessage;
          } else {
            recruitStatus.textContent = t('status_fail_generic');
          }
        }
      });

      if (langToggle) {
        langToggle.addEventListener('click', () => {
          setLang(currentLang === 'zh' ? 'en' : 'zh');
        });
      }

      setStaticText();
    })();
  </script>
