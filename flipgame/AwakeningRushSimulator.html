<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>觉醒冲榜模拟器 · ShinE</title>  <script>
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      var isStage = host === 'stage' || host.startsWith('stage.') || host.startsWith('stage-') || host.startsWith('stage--') || host.indexOf('--stage') !== -1 || host.indexOf('-stage.') !== -1;
      var svg = isLocal ? 'assets/local-logo.svg' : (isStage ? 'assets/stage-logo.svg' : 'assets/shine-logo.svg');
      var png32 = isLocal ? 'assets/local-logo-32.png' : (isStage ? 'assets/stage-logo-32.png' : 'assets/shine-logo-32.png');
      var ico = isLocal ? 'assets/local-favicon.ico' : (isStage ? 'assets/stage-favicon.ico' : 'assets/favicon.ico');
      var apple = isLocal ? 'assets/local-logo-180.png' : (isStage ? 'assets/stage-logo-180.png' : 'assets/shine-logo-180.png');
      var manifest = isLocal ? 'site.local.webmanifest' : (isStage ? 'site.stage.webmanifest' : 'site.webmanifest');
      var theme = isLocal ? '#fb7185' : (isStage ? '#0891b2' : '#6366f1');
      document.write('<link rel="icon" type="image/svg+xml" href="' + svg + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="' + png32 + '">');
      document.write('<link rel="shortcut icon" href="' + ico + '">');
      document.write('<link rel="apple-touch-icon" sizes="180x180" href="' + apple + '">');
      document.write('<link rel="manifest" href="' + manifest + '">');
      document.write('<meta name="theme-color" content="' + theme + '">');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gap: 12px;
      --radius: 16px;
      --shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
      --border: #e5e7eb;
      --ink: #111827;
      --muted: #64748b;
      --brand: #0f766e;
      --accent: #c2410c;
      --surface: #ffffff;
      --bg: #f7faf8;
      --soft: #eef7f4;
      --soft-2: #fff7ed;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      position: relative;
      margin: 0;
      padding: 0;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(194, 65, 12, 0.08), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    nav#topbar-nav {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 100;
      margin: 0;
      width: auto;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: saturate(140%) blur(6px);
    }
    nav#topbar-nav a {
      border: 1px solid transparent;
      background: rgba(15, 118, 110, 0.09);
      color: var(--brand);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      text-align: center;
    }
    nav#topbar-nav a:hover {
      background: rgba(15, 118, 110, 0.16);
      box-shadow: 0 6px 18px rgba(15, 118, 110, 0.22);
    }
    nav#topbar-nav a:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }
    .langbar {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 120;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: saturate(140%) blur(6px);
    }
    .wrap {
      width: min(1040px, 100%);
      margin: 72px auto 24px;
      padding: clamp(20px, 4vw, 36px);
      display: flex;
      flex-direction: column;
      gap: clamp(16px, 4vw, 24px);
      flex: 1 0 auto;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 10px;
    }
    .title h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 34px);
      letter-spacing: 0.03em;
    }
    .vip-page-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      margin-left: 10px;
      border: 1px solid rgba(194, 65, 12, 0.28);
      border-radius: 999px;
      padding: 3px 10px;
      background: #fff7ed;
      color: #c2410c;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.4;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    main.main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: clamp(16px, 4vw, 24px);
    }
    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(16px, 4vw, 24px);
      box-shadow: var(--shadow);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      align-items: flex-end;
    }
    .col {
      flex: 1 1 240px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      color: var(--muted);
      font-size: 14px;
    }
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      background: #fff;
      color: var(--ink);
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"]:focus-visible {
      outline: 2px solid rgba(15, 118, 110, 0.35);
      outline-offset: 2px;
    }
    .btn {
      border: 1px solid rgba(15, 118, 110, 0.34);
      background: var(--surface);
      padding: 10px 16px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(15, 118, 110, 0.16);
      cursor: pointer;
      font-size: 15px;
      color: var(--brand);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn.primary {
      background: linear-gradient(135deg, #0f766e, #c2410c);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.24);
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.22);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }
    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }
    .comparison {
      margin-top: clamp(14px, 3vw, 22px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .comparison-head,
    .compare-row {
      display: grid;
      grid-template-columns: minmax(110px, 1.1fr) repeat(2, minmax(120px, 1fr));
      gap: 10px;
      align-items: stretch;
    }
    .comparison-head {
      align-items: end;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .comparison-head h2 {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
    }
    .compare-col-label {
      padding: 0 12px;
      text-align: right;
      white-space: nowrap;
    }
    .compare-row {
      padding: 12px;
      border: 1px solid rgba(15, 118, 110, 0.12);
      border-radius: 14px;
      background: #fff;
    }
    .compare-row.gold {
      background: var(--soft-2);
      border-color: rgba(194, 65, 12, 0.18);
    }
    .compare-row.highlight {
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.1), rgba(255, 247, 237, 0.95));
      border-color: rgba(15, 118, 110, 0.22);
    }
    .compare-metric,
    .compare-cell {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .compare-metric {
      justify-content: center;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }
    .compare-cell {
      align-items: flex-end;
      justify-content: center;
      text-align: right;
    }
    .box {
      background: var(--soft);
      border: 1px solid rgba(15, 118, 110, 0.12);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 112px;
    }
    .box.gold {
      background: var(--soft-2);
      border-color: rgba(194, 65, 12, 0.18);
    }
    .kv {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 15px;
    }
    .v {
      font-weight: 800;
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.2;
      color: var(--ink);
      overflow-wrap: anywhere;
      text-align: right;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .tier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: var(--gap);
      margin-top: var(--gap);
    }
    .tier {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .tier-e {
      background: #eff6ff;
      border-color: #93c5fd;
    }
    .tier-e strong,
    .tier-e .tier-values small {
      color: #1d4ed8;
    }
    .tier-d {
      background: #fefce8;
      border-color: #fde047;
    }
    .tier-d strong,
    .tier-d .tier-values small {
      color: #a16207;
    }
    .tier-c {
      background: #faf5ff;
      border-color: #d8b4fe;
    }
    .tier-c strong,
    .tier-c .tier-values small {
      color: #7e22ce;
    }
    .tier-b {
      background: #f0fdf4;
      border-color: #86efac;
    }
    .tier-b strong,
    .tier-b .tier-values small {
      color: #15803d;
    }
    .tier-a {
      background: #fef2f2;
      border-color: #fca5a5;
    }
    .tier-a strong,
    .tier-a .tier-values small {
      color: #b91c1c;
    }
    .tier-s {
      background: #fff7ed;
      border-color: #fdba74;
    }
    .tier-s strong,
    .tier-s .tier-values small {
      color: #c2410c;
    }
    .tier-keep {
      border-width: 2px;
      box-shadow: inset 0 0 0 1px rgba(194, 65, 12, 0.12), 0 8px 18px rgba(194, 65, 12, 0.12);
      position: relative;
    }
    .tier-keep::after {
      content: "KEEP";
      position: absolute;
      right: 8px;
      top: -8px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.5;
    }
    .tier strong {
      font-size: 17px;
    }
    .tier-values {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      min-width: 0;
    }
    .tier-values span {
      color: var(--muted);
      font-weight: 700;
    }
    .tier-values small {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }
    .formula {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--gap);
      margin-top: var(--gap);
    }
    .formula .box {
      min-height: 92px;
      background: #fff;
    }
    body.auth-checking .wrap,
    body.auth-blocked .wrap {
      display: none;
    }
    .auth-card {
      width: min(520px, calc(100% - 32px));
      margin: 104px auto 24px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 5vw, 28px);
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    body.auth-checking .auth-card,
    body.auth-blocked .auth-card {
      display: flex;
    }
    .auth-card h2 {
      margin: 0;
      font-size: 22px;
    }
    .auth-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    .auth-actions a,
    .auth-actions button {
      border: 1px solid rgba(15, 118, 110, 0.34);
      background: #fff;
      padding: 10px 16px;
      border-radius: 14px;
      color: var(--brand);
      text-decoration: none;
      font-size: 15px;
      cursor: pointer;
    }
    .auth-actions a.primary {
      background: linear-gradient(135deg, #0f766e, #c2410c);
      color: #fff;
      border-color: transparent;
    }
    .logo-bottom-left {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: #111827;
    }
    .logo-bottom-left .logo-by {
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-left .logo-cn,
    .logo-bottom-left .logo-en {
      font-size: 20px;
      line-height: 1;
    }
    .logo-bottom-left .logo-cn {
      font-weight: 700;
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
    }
    .logo-bottom-left .logo-en {
      font-weight: 700;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-left .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0f766e, #c2410c);
    }
    @media (max-width: 720px) {
      nav#topbar-nav {
        position: static;
        align-self: flex-end;
        margin: 8px 8px 0 auto;
      }
      .wrap {
        margin: 6px auto 12px;
        padding: 18px 12px 20px;
        gap: 12px;
      }
      .site-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding-top: 4px;
      }
      .title h1 {
        font-size: 24px;
      }
      .title p {
        font-size: 13px;
        line-height: 1.45;
      }
      main.main {
        gap: 12px;
      }
      .card {
        padding: 14px;
        border-radius: 14px;
      }
      .tools {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
      .row {
        flex-direction: column;
        align-items: stretch;
      }
      .col {
        flex: 0 1 auto;
        width: 100%;
      }
      .hint {
        margin-top: 8px;
        min-height: 0;
        line-height: 1.4;
      }
      .comparison {
        gap: 8px;
        margin-top: 10px;
      }
      .comparison-head,
      .compare-row {
        grid-template-columns: minmax(86px, 0.85fr) repeat(2, minmax(0, 1fr));
        gap: 7px;
      }
      .comparison-head h2,
      .compare-col-label {
        font-size: 12px;
      }
      .compare-col-label {
        padding: 0;
      }
      .compare-row {
        padding: 9px;
        border-radius: 12px;
      }
      .compare-metric {
        font-size: 13px;
      }
      .box {
        min-height: 82px;
        padding: 10px;
        border-radius: 12px;
      }
      .kv {
        flex-direction: column;
        gap: 4px;
      }
      .v {
        text-align: left;
        font-size: 22px;
      }
      .muted {
        font-size: 12px;
        line-height: 1.35;
      }
      .tier-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .tier {
        padding: 9px 10px;
        border-radius: 10px;
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }
      .tier-values {
        align-items: flex-start;
      }
      .formula {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .formula .box {
        min-height: 76px;
      }
      .formula .box:first-child {
        grid-column: 1 / -1;
      }
      .logo-bottom-left {
        position: static;
        margin: 12px auto 0;
        justify-content: center;
      }
    }
    @media (max-width: 420px) {
      html, body {
        font-size: 15px;
      }
      nav#topbar-nav {
        gap: 6px;
        padding: 6px 10px;
      }
      nav#topbar-nav a {
        font-size: 13px;
        padding: 8px 12px;
      }
      .btn {
        font-size: 14px;
        padding: 10px 14px;
      }
      input[type="number"] {
        font-size: 15px;
        padding: 11px 12px;
      }
      .card {
        padding: 12px;
      }
      .comparison,
      .formula {
        gap: 7px;
      }
      .compare-row {
        grid-template-columns: minmax(76px, 0.75fr) repeat(2, minmax(0, 1fr));
      }
      .compare-row .muted {
        display: none;
      }
      .box {
        min-height: 76px;
        padding: 9px;
      }
      .box .muted {
        display: none;
      }
      .tier-grid {
        gap: 7px;
      }
      .tier {
        padding: 8px;
      }
      .tier strong {
        font-size: 15px;
      }
      .tier-values small {
        font-size: 11px;
      }
    }
  </style>
</head>
<body class="auth-checking">
  <nav id="topbar-nav" aria-label="页面导航">
    <a href="index.html" id="navHome">回到主页</a>
  </nav>

  <div class="langbar" style="display:none;">
    <button class="btn" id="langToggle" type="button">EN</button>
  </div>

  <section class="auth-card" id="authCard" aria-live="polite">
    <h2 id="authTitle">正在检查 VIP 权限</h2>
    <p id="authMessage">请稍候...</p>
    <div class="auth-actions" id="authActions" style="display:none;">
      <a class="primary" id="loginLink" href="Login.html?next=AwakeningRushSimulator.html">登录</a>
      <a id="registerLink" href="Register.html">注册账号</a>
      <button id="retryAuthBtn" type="button">重新检查</button>
    </div>
  </section>

  <div class="wrap">
    <header class="site-header">
      <div class="title">
        <h1 id="pageTitle">觉醒冲榜模拟器<span class="vip-page-badge">VIP</span></h1>
        <p id="pageDesc">每次觉醒先计分，B+ 及以下分解返钻，A- 及以上保留。</p>
      </div>
      <div class="tools">
        <button class="btn" id="clearBtn" type="button">清空</button>
      </div>
    </header>

    <main class="main">
      <section class="card" aria-labelledby="calculator-title">
        <h2 id="calculator-title" class="muted" style="margin:0 0 12px; font-size:15px;">输入绑钻数量后模拟一次冲榜结果</h2>
        <div class="row">
          <div class="col">
            <label for="diamonds" id="diamondsLabel">绑钻数量</label>
            <input id="diamonds" type="number" inputmode="numeric" min="0" max="2000000" step="1" placeholder="例如 50000" value="50000" />
          </div>
          <div class="tools">
            <button class="btn primary" id="simulateBtn" type="button">开始模拟</button>
          </div>
        </div>
        <p class="hint" id="hintText">上限 2,000,000 绑钻；每次点击会重新随机模拟。</p>

        <section class="comparison" aria-labelledby="expected-title" aria-live="polite">
          <div class="comparison-head">
            <h2 id="expected-title">模拟 / 理论对照</h2>
            <span class="compare-col-label" id="simulatedColumnLabel">本次模拟</span>
            <span class="compare-col-label" id="expectedColumnLabel">理论期望</span>

      const cumulativeTiers = TIERS.reduce(function (acc, tier) {
        const last = acc.length ? acc[acc.length - 1].limit : 0;
        acc.push(Object.assign({ limit: last + tier.probability }, tier));
        return acc;
      }, []);

      const langToggle = document.getElementById('langToggle');
      const navHome = document.getElementById('navHome');

      const hintText = document.getElementById('hintText');

      const scoreDesc = document.getElementById('scoreDesc');
      const aCountLabel = document.getElementById('aCountLabel');
      const aCountDesc = document.getElementById('aCountDesc');
      const sCountLabel = document.getElementById('sCountLabel');
      const sCountDesc = document.getElementById('sCountDesc');
      const pullsLabel = document.getElementById('pullsLabel');
      const pullsDesc = document.getElementById('pullsDesc');
      const expectedScoreLabel = document.getElementById('expectedScoreLabel');
      const expectedScoreDesc = document.getElementById('expectedScoreDesc');
      const expectedALabel = document.getElementById('expectedALabel');
      const expectedADesc = document.getElementById('expectedADesc');
      const expectedSLabel = document.getElementById('expectedSLabel');
      const expectedSDesc = document.getElementById('expectedSDesc');
      const expectedNetStarLabel = document.getElementById('expectedNetStarLabel');
      const expectedNetStarDesc = document.getElementById('expectedNetStarDesc');
      const expectedPullsLabel = document.getElementById('expectedPullsLabel');
      const expectedPullsDesc = document.getElementById('expectedPullsDesc');
      const netStarLabel = document.getElementById('netStarLabel');
      const netStarDesc = document.getElementById('netStarDesc');
      const topbarNav = document.getElementById('topbar-nav');
      const tierDistribution = document.getElementById('tierDistribution');

      const outputEls = {
        totalScore: document.getElementById('totalScore'),
        aCount: document.getElementById('aCount'),
        sCount: document.getElementById('sCount'),
        pulls: document.getElementById('pulls'),
        expectedScore: document.getElementById('expectedScore'),
        expectedA: document.getElementById('expectedA'),
        expectedS: document.getElementById('expectedS'),
        expectedNetStar: document.getElementById('expectedNetStar'),
        expectedPulls: document.getElementById('expectedPulls'),
        netStar: document.getElementById('netStar')
      };

      const I18N = {
        zh: {
          title: '觉醒冲榜模拟器 · ShinE',
          nav_label: '页面导航',
          nav_home: '回到主页',
          page_title: '觉醒冲榜模拟器',
          page_desc: '每次觉醒先计分，B+ 及以下分解返钻，A- 及以上保留。',
          calc_title: '输入绑钻数量后模拟一次冲榜结果',
          kept_title: '资质分布',
          expected_title: '模拟 / 理论对照',
          simulated_column_label: '本次模拟',
          expected_column_label: '理论期望',
          diamonds_label: '绑钻数量',
          diamonds_placeholder: '例如 50000',
          simulate: '开始模拟',
          clear: '清空',
          hint: '上限 2,000,000 绑钻；每次点击会重新随机模拟。',
          hint_over: '已按上限 2,000,000 绑钻计算。',
          score_label: '总分',
          score_desc: '冲榜积分',
          a_count_label: 'A数量',
          a_count_desc: 'A- / A / A+',
          s_count_label: 'S数量',
          s_count_desc: 'S / SS / SSS',
          pulls_label: '觉醒次数',
          pulls_desc: '包含返钻后继续觉醒',
          expected_score_label: '期望总分',
          expected_score_desc: '按平均返钻 47.731 递推',
          expected_a_label: '期望A数量',
          expected_a_desc: 'A- / A / A+ 概率合计 0.00024',
          expected_s_label: '期望S数量',
          expected_s_desc: 'S / SS / SSS 概率合计 0.000015',
          expected_net_star_label: '期望净投入',
          expected_net_star_desc: '按各资质概率 × 出货价格',
          expected_pulls_label: '期望觉醒次数',
          expected_pulls_desc: '初始绑钻 / 52.269',
          net_star_label: '净投入',
          net_star_desc: '投入星钻 - 出货星钻',
          price_load_failed: '未能加载资质价格（quality_prices.json），出货收益暂按 0 计算。',
          dash: '—',
          lang_toggle_en: 'EN',
          lang_toggle_zh: '中文'
        },
        en: {
          title: 'Awakening Rush Simulator · ShinE',
          nav_label: 'Page Navigation',
          nav_home: 'Home',
          page_title: 'Awakening Rush Simulator',
          page_desc: 'Each awakening scores first. B+ and below are recycled. A- and above are kept.',
          calc_title: 'Enter bound diamonds and simulate one run',
          kept_title: 'Tier Distribution',
          expected_title: 'Simulation / Expected',
          simulated_column_label: 'Simulation',
          expected_column_label: 'Expected',
          diamonds_label: 'Bound Diamonds',
          diamonds_placeholder: 'e.g. 50000',
          simulate: 'Simulate',
          clear: 'Clear',
          hint: 'Limit: 2,000,000 bound diamonds. Click again for a new random run.',
          hint_over: 'Calculated with the 2,000,000 bound diamond limit.',
          score_label: 'Total Score',
          score_desc: 'Rush score',
          a_count_label: 'A Count',
          a_count_desc: 'A- / A / A+',
          s_count_label: 'S Count',
          s_count_desc: 'S / SS / SSS',
          pulls_label: 'Awakenings',
          pulls_desc: 'Includes recycled diamonds',
          expected_score_label: 'Expected Score',
          expected_score_desc: 'Uses average refund 47.731',
          expected_a_label: 'Expected A Count',
          expected_a_desc: 'A- / A / A+ probability is 0.00024',
          expected_s_label: 'Expected S Count',
          expected_s_desc: 'S / SS / SSS probability is 0.000015',
          expected_net_star_label: 'Expected Net Input',
          expected_net_star_desc: 'Uses tier probability × kept price',
          expected_pulls_label: 'Expected Pulls',
          expected_pulls_desc: 'Initial diamonds / 52.269',
          net_star_label: 'Net Input',
          net_star_desc: 'Input star diamonds - kept value',
          price_load_failed: 'Failed to load quality_prices.json. Kept value is temporarily calculated as 0.',
          dash: '—',
          lang_toggle_en: 'EN',
          lang_toggle_zh: '中文'
        }
      };

      let currentLang = (localStorage.getItem('flipgame_lang') || '').toLowerCase();
      if (currentLang !== 'zh' && currentLang !== 'en') {
        const navLang = (navigator.language || '').toLowerCase();
        currentLang = navLang.startsWith('zh') ? 'zh' : 'en';
      }
      let starDiamondBoundDiamondRatio = null;
      let keptPrices = new Map();

      function t(key) {
        return (I18N[currentLang] && I18N[currentLang][key]) || I18N.zh[key] || '';
      }

      function normalizeTierName(level) {
        return String(level || '').trim().toUpperCase();
      }

      async function loadQualityPrices() {
        const candidates = ['/api/quality-prices', 'quality_prices.json', './quality_prices.json', '/flipgame/quality_prices.json'];
        let lastErr = null;
        for (const p of candidates) {
          try {
            const response = await fetch(p, { cache: 'no-cache' });
            if (!response.ok) {
              lastErr = new Error(`HTTP ${response.status} for ${p}`);
              continue;
            }
            const data = await response.json();
            const ratio = Number(data.starDiamondBoundDiamondRatio);
            const rows = Array.isArray(data.tiers) ? data.tiers : [];
            const parsedPrices = rows.map((row) => ({
              tier: normalizeTierName(row.tier),
              keptPrice: Number(row.keptPrice)
            })).filter((row) => row.tier && Number.isFinite(row.keptPrice) && row.keptPrice >= 0);
            if (Number.isFinite(ratio) && ratio > 0 && parsedPrices.length) {
              starDiamondBoundDiamondRatio = ratio;
              keptPrices = new Map(parsedPrices.map((row) => [row.tier, row.keptPrice]));
              return;
            }
            lastErr = new Error(`No valid quality prices in ${p}`);
          } catch (err) {
            lastErr = err;
          }
        }
        throw lastErr || new Error('Failed to load quality price data');
      }

      function setStaticText() {
        document.title = t('title');
        document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : 'en';
        if (topbarNav) topbarNav.setAttribute('aria-label', t('nav_label'));
        if (navHome) navHome.textContent = t('nav_home');
        if (pageTitle) {
          pageTitle.textContent = t('page_title');
          const badge = document.createElement('span');
          badge.className = 'vip-page-badge';
          badge.textContent = 'VIP';
          pageTitle.appendChild(badge);
        }
        if (pageDesc) pageDesc.textContent = t('page_desc');
        if (calculatorTitle) calculatorTitle.textContent = t('calc_title');
        if (keptTitle) keptTitle.textContent = t('kept_title');
        if (expectedTitle) expectedTitle.textContent = t('expected_title');
        if (simulatedColumnLabel) simulatedColumnLabel.textContent = t('simulated_column_label');
        if (expectedColumnLabel) expectedColumnLabel.textContent = t('expected_column_label');
        if (diamondsLabel) diamondsLabel.textContent = t('diamonds_label');
        if (diamondsEl) diamondsEl.setAttribute('placeholder', t('diamonds_placeholder'));
        if (simulateBtn) simulateBtn.textContent = t('simulate');
        if (clearBtn) clearBtn.textContent = t('clear');
        if (hintText) hintText.textContent = t('hint');
        if (scoreLabel) scoreLabel.textContent = t('score_label');
        if (scoreDesc) scoreDesc.textContent = t('score_desc');
        if (aCountLabel) aCountLabel.textContent = t('a_count_label');
        if (aCountDesc) aCountDesc.textContent = t('a_count_desc');
        if (sCountLabel) sCountLabel.textContent = t('s_count_label');
        if (sCountDesc) sCountDesc.textContent = t('s_count_desc');
        if (pullsLabel) pullsLabel.textContent = t('pulls_label');
        if (pullsDesc) pullsDesc.textContent = t('pulls_desc');
        if (expectedScoreLabel) expectedScoreLabel.textContent = t('expected_score_label');
        if (expectedScoreDesc) expectedScoreDesc.textContent = t('expected_score_desc');
        if (expectedALabel) expectedALabel.textContent = t('expected_a_label');
        if (expectedADesc) expectedADesc.textContent = t('expected_a_desc');
        if (expectedSLabel) expectedSLabel.textContent = t('expected_s_label');
        if (expectedSDesc) expectedSDesc.textContent = t('expected_s_desc');
        if (expectedNetStarLabel) expectedNetStarLabel.textContent = t('expected_net_star_label');
        if (expectedNetStarDesc) expectedNetStarDesc.textContent = t('expected_net_star_desc');
        if (expectedPullsLabel) expectedPullsLabel.textContent = t('expected_pulls_label');
        if (expectedPullsDesc) expectedPullsDesc.textContent = t('expected_pulls_desc');
        if (netStarLabel) netStarLabel.textContent = t('net_star_label');
        if (netStarDesc) netStarDesc.textContent = t('net_star_desc');
        if (langToggle) langToggle.textContent = currentLang === 'zh' ? t('lang_toggle_en') : t('lang_toggle_zh');
      }

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('flipgame_lang', lang);
        setStaticText();
      }

      function toInputDiamonds() {
        const parsed = Math.floor(Number(diamondsEl.value));
        if (!Number.isFinite(parsed) || parsed < 0) return 0;
        return Math.min(parsed, MAX_DIAMONDS);
      }

      function formatInt(value) {
        return Math.round(value).toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US');
      }

      function formatDecimal(value, digits) {
        return value.toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits
        });
      }

      function renderTierShell() {
        if (!tierDistribution) return;
        tierDistribution.innerHTML = '';
        TIERS.forEach(function (tier) {
          const item = document.createElement('div');
          item.className = 'tier tier-' + tier.name.charAt(0).toLowerCase();
          if (tier.keep) item.classList.add('tier-keep');
          item.setAttribute('data-tier-name', tier.name);

          const name = document.createElement('strong');
          name.textContent = tier.name;

          const values = document.createElement('span');
          values.className = 'tier-values';

          const count = document.createElement('span');
          count.setAttribute('data-tier-count', '');
          count.textContent = '0';

          const rate = document.createElement('small');
          rate.setAttribute('data-tier-rate', '');
          rate.textContent = '0.00%';

          values.appendChild(count);
          values.appendChild(rate);
          item.appendChild(name);
          item.appendChild(values);
          tierDistribution.appendChild(item);
        });
      }

      function renderTierDistribution(result) {
        if (!tierDistribution) return;
        TIERS.forEach(function (tier) {
          const item = tierDistribution.querySelector('[data-tier-name="' + tier.name + '"]');
          if (!item) return;
          const count = result.tierCounts[tier.name] || 0;
          const rate = result.pulls > 0 ? (count / result.pulls) * 100 : 0;
          const countEl = item.querySelector('[data-tier-count]');
          const rateEl = item.querySelector('[data-tier-rate]');
          if (countEl) countEl.textContent = formatInt(count);
          if (rateEl) rateEl.textContent = formatDecimal(rate, 2) + '%';
        });
      }

      function drawTier() {
        const roll = Math.random();
        for (let i = 0; i < cumulativeTiers.length; i += 1) {
          if (roll < cumulativeTiers[i].limit) return cumulativeTiers[i];
        }
        return cumulativeTiers[cumulativeTiers.length - 1];
      }

      function runSimulation(startDiamonds) {
        let diamonds = startDiamonds;
        let score = 0;
        let pulls = 0;
        const tierCounts = Object.fromEntries(TIERS.map(function (tier) {
          return [tier.name, 0];
        }));
        const kept = { 'A-': 0, A: 0, 'A+': 0, S: 0, SS: 0, SSS: 0 };
        while (diamonds >= COST) {
          diamonds -= COST;
          pulls += 1;
          const tier = drawTier();
          tierCounts[tier.name] += 1;
          score += tier.score;
          if (tier.keep) {
            kept[tier.name] += 1;
          } else {
            diamonds += tier.refund;
          }
        }
        return {
          score,
          pulls,
          left: diamonds,
          kept,
          tierCounts,
          aCount: kept['A-'] + kept.A + kept['A+'],
          sCount: kept.S + kept.SS + kept.SSS
        };
      }

      function updateExpectation(startDiamonds) {
        const expectedPulls = startDiamonds / (COST - EXPECTED_REFUND);
        outputEls.expectedPulls.textContent = formatInt(expectedPulls);
        outputEls.expectedScore.textContent = formatInt(expectedPulls * EXPECTED_SCORE);
        outputEls.expectedA.textContent = formatDecimal(expectedPulls * A_PROBABILITY, 3);
        outputEls.expectedS.textContent = formatDecimal(expectedPulls * S_PROBABILITY, 3);
        updateExpectedInvestment(startDiamonds, expectedPulls);
      }

      function updateExpectedInvestment(startDiamonds, expectedPulls) {
        const ratio = Number(starDiamondBoundDiamondRatio);
        if (!Number.isFinite(ratio) || ratio <= 0) {
          outputEls.expectedNetStar.textContent = t('dash');
          if (expectedNetStarDesc) expectedNetStarDesc.textContent = t('price_load_failed');
          return;
        }
        const inputStar = startDiamonds / ratio;
        const expectedKeptStar = TIERS.reduce((total, tier) => {
          if (!tier.keep) return total;
          const price = keptPrices.get(normalizeTierName(tier.name));
          return total + expectedPulls * tier.probability * (Number.isFinite(price) ? price : 0);
        }, 0);
        const expectedNetStar = inputStar - expectedKeptStar;
        outputEls.expectedNetStar.textContent = formatInt(expectedNetStar);
        if (expectedNetStarDesc) {
          expectedNetStarDesc.textContent = `${formatInt(inputStar)} - ${formatInt(expectedKeptStar)} = ${formatInt(expectedNetStar)}`;
        }
      }

      function updateInvestment(startDiamonds, result) {
        const ratio = Number(starDiamondBoundDiamondRatio);
        if (!Number.isFinite(ratio) || ratio <= 0) {
          outputEls.netStar.textContent = t('dash');
          if (netStarDesc) netStarDesc.textContent = t('price_load_failed');
          return;
        }
        const inputStar = startDiamonds / ratio;
        const keptStar = Object.keys(result.kept).reduce((total, tier) => {
          const price = keptPrices.get(normalizeTierName(tier));
          const count = result.kept[tier] || 0;
          return total + count * (Number.isFinite(price) ? price : 0);
        }, 0);
        const netStar = inputStar - keptStar;
        outputEls.netStar.textContent = formatInt(netStar);
        if (netStarDesc) {
          netStarDesc.textContent = `${formatInt(inputStar)} - ${formatInt(keptStar)} = ${formatInt(netStar)}`;
        }
      }

      function simulate() {
        const raw = Math.floor(Number(diamondsEl.value));
        const startDiamonds = toInputDiamonds();
        if (String(startDiamonds) !== diamondsEl.value) {
          diamondsEl.value = String(startDiamonds);
        }
        hintText.textContent = raw > MAX_DIAMONDS ? t('hint_over') : t('hint');
        const result = runSimulation(startDiamonds);
        outputEls.totalScore.textContent = formatInt(result.score);
        outputEls.aCount.textContent = formatInt(result.aCount);
        outputEls.sCount.textContent = formatInt(result.sCount);
        outputEls.pulls.textContent = formatInt(result.pulls);
        renderTierDistribution(result);
        updateExpectation(startDiamonds);
        updateInvestment(startDiamonds, result);
      }

      simulateBtn.addEventListener('click', simulate);
      diamondsEl.addEventListener('change', simulate);
      diamondsEl.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') simulate();
      });
      clearBtn.addEventListener('click', function () {
        diamondsEl.value = '0';
        simulate();
        diamondsEl.focus();
      });
      if (langToggle) {
        langToggle.addEventListener('click', function () {
          setLang(currentLang === 'zh' ? 'en' : 'zh');
          simulate();
        });
      }

      setStaticText();
      renderTierShell();
      loadQualityPrices()
        .catch((err) => {
          console.error('Failed to load quality prices:', err);
          if (netStarDesc) netStarDesc.textContent = t('price_load_failed');
        })
        .finally(simulate);
    })();
  </script>
  <script type="module">
    import * as identity from "https://esm.sh/@netlify/identity?bundle";

    const authTitle = document.getElementById("authTitle");
    const authMessage = document.getElementById("authMessage");
    const authActions = document.getElementById("authActions");
    const retryAuthBtn = document.getElementById("retryAuthBtn");
    const host = (window.location.hostname || "").toLowerCase();
    function isPrivateIpv4Host(value) {
      const parts = value.split(".").map((part) => Number(part));
      if (parts.length !== 4 || parts.some((part) => !Number.isInteger(part) || part < 0 || part > 255)) {
        return false;
      }
      return parts[0] === 10
        || (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31)
        || (parts[0] === 192 && parts[1] === 168);
    }
    const isLocal = window.location.protocol === "file:"
      || host === "localhost"
      || host === "127.0.0.1"
      || host === "0.0.0.0"
      || host === "::1"
      || isPrivateIpv4Host(host);

    async function restoreIdentitySession() {
      await identity.handleAuthCallback().catch(() => null);
      if (typeof identity.hydrateSession === "function") {
        await identity.hydrateSession().catch(() => null);
      }
      return identity.getUser().catch(() => null);
    }

    async function checkAccess() {
      if (isLocal) {
        document.body.classList.remove("auth-checking", "auth-blocked");
        return;
      }
      document.body.classList.add("auth-checking");
      document.body.classList.remove("auth-blocked");
      authTitle.textContent = "正在检查 VIP 权限";
      authMessage.textContent = "正在恢复登录状态，请稍候...";
      authActions.style.display = "none";

      const user = await restoreIdentitySession();
      if (!user) {
        document.body.classList.remove("auth-checking");
        document.body.classList.add("auth-blocked");
        authTitle.textContent = "需要登录";
        authMessage.textContent = "觉醒冲榜模拟器是 VIP 专属页面，请先登录或注册账号提交审核。";
        authActions.style.display = "flex";
        return;
      }

      const response = await fetch("/api/me", { credentials: "include" });
      const data = await response.json().catch(() => ({}));
      if (response.status === 401) {
        document.body.classList.remove("auth-checking");
        document.body.classList.add("auth-blocked");
        authTitle.textContent = "需要重新登录";
        authMessage.textContent = "登录状态已过期，请重新登录后继续使用。";
        authActions.style.display = "flex";
        return;
      }
      if (response.ok && data.canAccessPremium) {
        document.body.classList.remove("auth-checking", "auth-blocked");
        return;
      }

      document.body.classList.remove("auth-checking");
      document.body.classList.add("auth-blocked");
      authTitle.textContent = "VIP 权限未开启";
      authMessage.textContent = "你的账号已登录，但还没有 VIP 权限。请等待管理员审核，或联系管理员开通。";
      authActions.style.display = "flex";
    }

    retryAuthBtn.addEventListener("click", () => {
      checkAccess().catch((error) => {
        document.body.classList.remove("auth-checking");
        document.body.classList.add("auth-blocked");
        authTitle.textContent = "权限检查失败";
        authMessage.textContent = error.message || String(error);
        authActions.style.display = "flex";
      });
    });

    checkAccess().catch((error) => {
      document.body.classList.remove("auth-checking");
      document.body.classList.add("auth-blocked");
      authTitle.textContent = "权限检查失败";
      authMessage.textContent = error.message || String(error);
      authActions.style.display = "flex";
    });
  </script>
</body>
</html>
