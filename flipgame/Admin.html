<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台 · ShinE</title>  <script>
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      var isStage = host === 'stage' || host.startsWith('stage.') || host.startsWith('stage-') || host.startsWith('stage--') || host.indexOf('--stage') !== -1 || host.indexOf('-stage.') !== -1;
      var svg = isLocal ? 'assets/local-logo.svg' : (isStage ? 'assets/stage-logo.svg' : 'assets/shine-logo.svg');
      var png32 = isLocal ? 'assets/local-logo-32.png' : (isStage ? 'assets/stage-logo-32.png' : 'assets/shine-logo-32.png');
      var ico = isLocal ? 'assets/local-favicon.ico' : (isStage ? 'assets/stage-favicon.ico' : 'assets/favicon.ico');
      document.write('<link rel="icon" type="image/svg+xml" href="' + svg + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="' + png32 + '">');
      document.write('<link rel="shortcut icon" href="' + ico + '">');
    })();
  </script>
  <style>
    :root {
      --bg: #eef3f2;
      --surface: #ffffff;
      --surface-2: #f8faf9;
      --ink: #14201f;
      --muted: #64706e;
      --line: #dce5e2;
      --line-strong: #b9c8c3;
      --brand: #0f766e;
      --brand-dark: #0b4f4a;
      --accent: #b45309;
      --danger: #be123c;
      --ok: #047857;
      --shadow: 0 16px 36px rgba(20, 32, 31, 0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }
    body { padding: 24px; }
    .admin-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      background: #102a33;
      color: #fff;
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .title-block {
      display: grid;
      gap: 4px;
    }
    .eyebrow {
      margin: 0;
      color: #b7d7d4;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .topbar p { color: #d9e7e5; }
    a, button {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--brand-dark);
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    a:hover, button:hover {
      border-color: var(--brand);
      color: var(--brand);
    }
    .topbar a, .topbar button {
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: transparent;
    }
    button.danger {
      color: var(--danger);
      border-color: rgba(190, 18, 60, 0.25);
    }
    button.ghost {
      background: transparent;
    }
    .toolbar,
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(340px, 0.75fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, var(--surface-2));
      cursor: pointer;
    }
    .panel-title {
      display: grid;
      gap: 4px;
    }
    .panel-body { padding: 0; }
    .panel-toggle {
      min-width: 64px;
    }
    .panel.is-collapsed .collapsible {
      display: none;
    }
    .panel.is-collapsed .panel-head {
      border-bottom: 0;
    }
    .panel-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: var(--surface-2);
    }
    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }
    .summary-item {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
    }
    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }
    .summary-value {
      margin-top: 2px;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      background: var(--surface-2);
      white-space: nowrap;
    }
    tbody tr:hover td { background: #fbfcfb; }
    .account-cell {
      display: grid;
      gap: 3px;
      min-width: 180px;
    }
    .account-meta {
      color: var(--muted);
      font-size: 12px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .status-line {
      color: var(--muted);
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }
    .badge.ok {
      border-color: rgba(4, 120, 87, 0.22);
      background: #ecfdf5;
      color: var(--ok);
    }
    .badge.warn {
      border-color: rgba(180, 83, 9, 0.24);
      background: #fffbeb;
      color: var(--accent);
    }
    .badge.danger {
      border-color: rgba(190, 18, 60, 0.22);
      background: #fff1f2;
      color: var(--danger);
    }
    .mode-pill {
      width: fit-content;
      margin-top: 4px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      padding: 2px 9px;
      color: #fff7ed;
      background: rgba(180, 83, 9, 0.36);
      font-size: 12px;
      font-weight: 700;
    }
    .field {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      font: inherit;
      background: #fff;
    }
    input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.18);
      border-color: rgba(15, 118, 110, 0.6);
    }
    .price-tools {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }
    .price-table input {
      min-width: 108px;
      text-align: right;
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-row {
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 980px) {
      body { padding: 14px; }
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .topbar, .panel-head, .panel-footer { align-items: stretch; }
      .toolbar, .actions { width: 100%; }
      .toolbar > *, .actions > * { flex: 1 1 auto; }
      .summary-row { grid-template-columns: 1fr; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--line); padding: 10px 12px; }
      td { border: 0; padding: 5px 0; }
      td::before {
        content: attr(data-label) "：";
        color: var(--muted);
        display: inline-block;
        min-width: 86px;
      }
    }
  </style>
</head>
<body>
  <div class="admin-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">ShinE Admin</p>
        <h1>管理后台</h1>
        <p>账号审核和资质价格维护</p>
        <span class="mode-pill" id="modePill" hidden>本地 Mock 预览</span>
      </div>
      <div class="toolbar">
        <a href="index.html">回到主页</a>
        <button id="refreshBtn" type="button">刷新</button>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel is-collapsed" aria-labelledby="users-title" data-panel="users">
        <div class="panel-head" data-panel-head>
          <div class="panel-title">
            <h2 id="users-title">VIP 用户</h2>
            <p>审核注册账号，管理会员访问状态。</p>
          </div>
          <div class="actions">
            <div class="status-line" id="userStatus" role="status">正在检查管理员权限...</div>
            <button class="panel-toggle" type="button" data-collapse-toggle aria-expanded="false">展开</button>
          </div>
        </div>
        <div class="collapsible">
          <div class="summary-row" id="userSummary" aria-label="用户统计">
            <div class="summary-item">
              <div class="summary-label">账号</div>
              <div class="summary-value">0</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">待审核</div>
              <div class="summary-value">0</div>
            </div>
            <div class="summary-item">
              <div class="summary-label">VIP/Admin</div>
              <div class="summary-value">0</div>
            </div>
          </div>
          <div class="table-wrap">
            <table aria-label="用户列表">
              <thead>
                <tr>
                  <th>账号</th>
                  <th>邮箱确认</th>
                  <th>角色</th>
                  <th>申请时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userRows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="panel is-collapsed" aria-labelledby="prices-title" data-panel="prices">
        <div class="panel-head" data-panel-head>
          <div class="panel-title">
            <h2 id="prices-title">资质价格</h2>
            <p>升格成本使用狗粮单价，觉醒净投入使用出货价格。</p>
          </div>
          <div class="actions">
            <button class="panel-toggle" type="button" data-collapse-toggle aria-expanded="false">展开</button>
            <button id="reloadPricesBtn" type="button">重载</button>
            <button id="savePricesBtn" class="primary" type="button">保存</button>
          </div>
        </div>
        <div class="collapsible">
          <div class="price-tools">
            <label class="field">
              星钻 / 绑钻比例
              <input id="starRatioInput" type="number" min="0.0001" step="0.0001" inputmode="decimal" />
            </label>
            <div class="status-line" id="priceStatus" role="status">等待加载价格...</div>
          </div>
          <div class="table-wrap">
            <table class="price-table" aria-label="资质价格表">
              <thead>
                <tr>
                  <th>资质</th>
                  <th>狗粮单价</th>
                  <th>出货价格</th>
                </tr>
              </thead>
              <tbody id="priceRows"></tbody>
            </table>
          </div>
          <div class="panel-footer">
            <div class="meta" id="priceMeta"></div>
            <div class="status-line" id="priceSummary">12 个资质档</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { clearPersistentIdentityCookies, restoreIdentitySession as restoreNetlifyIdentitySession } from "./assets/auth-session.js";

    const LOCAL_MOCK_MODE = isLocalAdminPreview();
    let identity = null;
    const userStatusEl = document.getElementById("userStatus");
    const userSummaryEl = document.getElementById("userSummary");
    const rowsEl = document.getElementById("userRows");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const modePill = document.getElementById("modePill");
    const priceStatusEl = document.getElementById("priceStatus");
    const priceRowsEl = document.getElementById("priceRows");
    const priceMetaEl = document.getElementById("priceMeta");
    const priceSummaryEl = document.getElementById("priceSummary");
    const starRatioInput = document.getElementById("starRatioInput");
    const reloadPricesBtn = document.getElementById("reloadPricesBtn");
    const savePricesBtn = document.getElementById("savePricesBtn");

    const TIER_ORDER = ["C-", "C", "C+", "B-", "B", "B+", "A-", "A", "A+", "S", "SS", "SSS"];
    let mockUsers = [
      {
        email: "shine@example.com",
        guild: "31939",
        gameName: "ShinE",
        role: "vip",
        emailVerified: true,
        emailConfirmedAt: "2026-06-28T07:00:00Z",
        requestedAt: "2026-06-28T06:30:00Z"
      },
      {
        email: "new@example.com",
        guild: "",
        gameName: "New User",
        role: "pending",
        emailVerified: false,
        requestedAt: "2026-06-28T08:00:00Z"
      },
      {
        email: "blocked@example.com",
        guild: "Test",
        gameName: "Blocked Demo",
        role: "blocked",
        emailVerified: true,
        emailConfirmedAt: "2026-06-27T20:00:00Z",
        requestedAt: "2026-06-27T19:20:00Z"
      }
    ];

    function isLocalAdminPreview() {
      const host = (window.location.hostname || "").toLowerCase();
      return window.location.protocol === "file:"
        || host === "localhost"
        || host === "127.0.0.1"
        || host === "0.0.0.0"
        || host === "::1";
    }

    async function loadIdentity() {
      if (!identity) {
        identity = await import("https://esm.sh/@netlify/identity?bundle");
      }
      return identity;
    }

    async function restoreIdentitySession() {
      const identityApi = await loadIdentity();
      return restoreNetlifyIdentitySession(identityApi);
    }

    async function api(path, options) {
      const response = await fetch(path, {
        credentials: "include",
        ...(options || {}),
        headers: {
          "Content-Type": "application/json",
          ...((options && options.headers) || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function render(users) {
      rowsEl.innerHTML = "";
      renderUserSummary(users);
      if (!users.length) {
        rowsEl.innerHTML = '<tr><td class="empty-row" colspan="5">暂无账号申请</td></tr>';
        return;
      }
      for (const user of users) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="账号">
            <div class="account-cell">
              <span class="mono">${escapeHtml(user.email)}</span>
              <span class="account-meta">${escapeHtml(user.gameName || "未填写")} · 公会 ${escapeHtml(user.guild || "-")}</span>
            </div>
          </td>
          <td data-label="邮箱确认">${emailStatus(user)}</td>
          <td data-label="角色">${roleStatus(user.role)}</td>
          <td data-label="申请时间" class="mono">${escapeHtml(user.requestedAt || user.createdAt)}</td>
          <td data-label="操作">
            <div class="actions">
              <button data-role="vip" type="button">VIP</button>
              <button data-role="pending" type="button" class="ghost">待审</button>
              <button data-role="blocked" type="button" class="danger">禁用</button>
            </div>
          </td>
        `;
        tr.querySelectorAll("button[data-role]").forEach((button) => {
          button.addEventListener("click", () => setRole(user.email, button.dataset.role));
        });
        rowsEl.appendChild(tr);
      }
    }

    function renderUserSummary(users) {
      const total = users.length;
      const pending = users.filter((user) => user.role === "pending" || user.role === "free").length;
      const vip = users.filter((user) => user.role === "vip" || user.role === "admin").length;
      userSummaryEl.innerHTML = `
        <div class="summary-item">
          <div class="summary-label">账号</div>
          <div class="summary-value">${total}</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">待审核</div>
          <div class="summary-value">${pending}</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">VIP/Admin</div>
          <div class="summary-value">${vip}</div>
        </div>
      `;
    }

    function renderPrices(data) {
      const rows = Array.isArray(data.tiers) ? data.tiers : [];
      const byTier = new Map(rows.map((row) => [String(row.tier || "").toUpperCase(), row]));
      starRatioInput.value = Number(data.starDiamondBoundDiamondRatio || 0);
      priceRowsEl.innerHTML = "";
      for (const tier of TIER_ORDER) {
        const row = byTier.get(tier) || {};
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="资质">${tier}</td>
          <td data-label="狗粮单价"><input data-tier="${tier}" data-field="foodPrice" type="number" min="0" step="1" inputmode="numeric" value="${Number(row.foodPrice || 0)}" /></td>
          <td data-label="出货价格"><input data-tier="${tier}" data-field="keptPrice" type="number" min="0" step="1" inputmode="numeric" value="${Number(row.keptPrice || 0)}" /></td>
        `;
        priceRowsEl.appendChild(tr);
      }
      priceMetaEl.textContent = "";
      const meta = [
        data.storage ? `存储：${data.storage}` : "",
        data.updatedAt ? `更新：${data.updatedAt}` : "",
        data.updatedBy ? `操作：${data.updatedBy}` : ""
      ].filter(Boolean);
      for (const item of meta) {
        const span = document.createElement("span");
        span.textContent = item;
        priceMetaEl.appendChild(span);
      }
      priceSummaryEl.textContent = `${TIER_ORDER.length} 个资质档`;
    }

    function emailStatus(user) {
      if (user.emailVerified === true || user.emailConfirmedAt) return '<span class="badge ok">已确认</span>';
      if (user.emailVerified === false) return '<span class="badge warn">未确认</span>';
      return '<span class="badge">未知</span>';
    }

    function roleStatus(role) {
      const clean = String(role || "").trim().toLowerCase();
      if (clean === "vip" || clean === "admin") return `<span class="badge ok">${escapeHtml(clean)}</span>`;
      if (clean === "blocked") return '<span class="badge danger">blocked</span>';
      if (clean === "pending") return '<span class="badge warn">pending</span>';
      return `<span class="badge">${escapeHtml(clean || "free")}</span>`;
    }

    function setPanelCollapsed(panel, collapsed) {
      panel.classList.toggle("is-collapsed", collapsed);
      const toggle = panel.querySelector("[data-collapse-toggle]");
      if (toggle) {
        toggle.textContent = collapsed ? "展开" : "收起";
        toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
      }
    }

    function initPanelToggles() {
      document.querySelectorAll("[data-panel]").forEach((panel) => {
        setPanelCollapsed(panel, panel.classList.contains("is-collapsed"));
        const head = panel.querySelector("[data-panel-head]");
        const toggle = panel.querySelector("[data-collapse-toggle]");
        const switchPanel = () => setPanelCollapsed(panel, !panel.classList.contains("is-collapsed"));
        if (toggle) {
          toggle.addEventListener("click", (event) => {
            event.stopPropagation();
            switchPanel();
          });
        }
        if (head) {
          head.addEventListener("click", (event) => {
            if (event.target.closest("button, a, input, select, textarea")) return;
            switchPanel();
          });
        }
      });
    }

    async function loadUsers() {
      if (LOCAL_MOCK_MODE) {
        render(mockUsers);
        userStatusEl.textContent = `本地 Mock：已加载 ${mockUsers.length} 个示例账号。`;
        return;
      }
      userStatusEl.textContent = "正在加载用户...";
      const currentUser = await restoreIdentitySession();
      if (!currentUser) {
        window.location.href = "Login.html?next=Admin.html";
        return;
      }
      const data = await api("/api/admin/users");
      render(data.users || []);
      userStatusEl.textContent = data.identitySyncError
        ? `已加载 ${(data.users || []).length} 个申请账号，但邮箱确认状态未能从 Identity 刷新：${data.identitySyncError}`
        : `已加载 ${(data.users || []).length} 个申请账号。`;
    }

    async function setRole(email, role) {
      if (LOCAL_MOCK_MODE) {
        mockUsers = mockUsers.map((user) => user.email === email ? { ...user, role } : user);
        render(mockUsers);
        userStatusEl.textContent = `本地 Mock：${email} 已临时改为 ${role}，不会保存到线上。`;
        return;
      }
      userStatusEl.textContent = `正在更新 ${email}...`;
      await api("/api/admin/set-role", {
        method: "POST",
        body: JSON.stringify({ email, role })
      });
      await loadUsers();
    }

    async function loadPrices() {
      if (LOCAL_MOCK_MODE) {
        priceStatusEl.textContent = "正在加载本地价格...";
        const response = await fetch("quality_prices.json", { cache: "no-cache" });
        const data = await response.json();
        renderPrices({
          ...data,
          storage: "local-mock",
          updatedAt: "本地预览",
          updatedBy: "browser"
        });
        priceStatusEl.textContent = "本地 Mock：价格已加载，保存不会写入线上。";
        return;
      }
      priceStatusEl.textContent = "正在加载价格...";
      const data = await api("/api/admin/quality-prices");
      renderPrices(data);
      priceStatusEl.textContent = data.storageError
        ? `已载入默认价格，价格存储读取失败：${data.storageError}`
        : "价格已加载。";
    }

    function collectPrices() {
      const tiers = TIER_ORDER.map((tier) => {
        const foodInput = priceRowsEl.querySelector(`input[data-tier="${tier}"][data-field="foodPrice"]`);
        const keptInput = priceRowsEl.querySelector(`input[data-tier="${tier}"][data-field="keptPrice"]`);
        return {
          tier,
          foodPrice: Number(foodInput && foodInput.value),
          keptPrice: Number(keptInput && keptInput.value)
        };
      });
      return {
        starDiamondBoundDiamondRatio: Number(starRatioInput.value),
        tiers
      };
    }

    async function savePrices() {
      if (LOCAL_MOCK_MODE) {
        renderPrices({
          ...collectPrices(),
          storage: "local-mock",
          updatedAt: new Date().toISOString(),
          updatedBy: "browser"
        });
        priceStatusEl.textContent = "本地 Mock：价格已临时更新，不会保存到线上。";
        return;
      }
      priceStatusEl.textContent = "正在保存价格...";
      const data = await api("/api/admin/quality-prices", {
        method: "POST",
        body: JSON.stringify(collectPrices())
      });
      renderPrices(data.prices || {});
      priceStatusEl.textContent = "价格已保存，计算器会读取最新价格。";
    }

    refreshBtn.addEventListener("click", () => loadUsers().catch((error) => {
      userStatusEl.textContent = "加载失败：" + (error.message || error);
    }));
    reloadPricesBtn.addEventListener("click", () => loadPrices().catch((error) => {
      priceStatusEl.textContent = "价格加载失败：" + (error.message || error);
    }));
    savePricesBtn.addEventListener("click", () => savePrices().catch((error) => {
      priceStatusEl.textContent = "价格保存失败：" + (error.message || error);
    }));
    logoutBtn.addEventListener("click", async () => {
      if (LOCAL_MOCK_MODE) {
        userStatusEl.textContent = "本地 Mock：没有真实登录会话。";
        return;
      }
      const identityApi = await loadIdentity();
      await identityApi.logout();
      clearPersistentIdentityCookies();
      window.location.href = "Login.html?next=Admin.html";
    });

    if (LOCAL_MOCK_MODE && modePill) {
      modePill.hidden = false;
    }
    initPanelToggles();

    Promise.all([
      loadUsers(),
      loadPrices()
    ]).catch((error) => {
      userStatusEl.textContent = "没有权限或加载失败：" + (error.message || error);
      priceStatusEl.textContent = "没有权限或加载失败：" + (error.message || error);
    });
  </script>
</body>
</html>
