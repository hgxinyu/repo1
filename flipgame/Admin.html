<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台 · ShinE</title>  <script>
    (function () {
      var host = (window.location.hostname || '').toLowerCase();
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      var svg = isLocal ? 'assets/local-logo.svg' : 'assets/shine-logo.svg';
      var png32 = isLocal ? 'assets/local-logo-32.png' : 'assets/shine-logo-32.png';
      var ico = isLocal ? 'assets/local-favicon.ico' : 'assets/favicon.ico';
      document.write('<link rel="icon" type="image/svg+xml" href="' + svg + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="' + png32 + '">');
      document.write('<link rel="shortcut icon" href="' + ico + '">');
    })();
  </script>
  <style>
    :root {
      --border: #e5e7eb;
      --ink: #111827;
      --muted: #64748b;
      --brand: #0f766e;
      --bg: #f7faf8;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }
    body { padding: 22px; }
    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    header, .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: clamp(16px, 4vw, 24px);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 28px; }
    p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    a, button, select {
      border: 1px solid rgba(15, 118, 110, 0.34);
      border-radius: 12px;
      padding: 8px 12px;
      background: #fff;
      color: var(--brand);
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, #0f766e, #c2410c);
      color: #fff;
      border-color: transparent;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .status { min-height: 22px; color: var(--muted); font-size: 14px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }
    .field {
      display: grid;
      gap: 5px;
      min-width: min(260px, 100%);
      color: var(--muted);
      font-size: 13px;
    }
    input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      color: var(--ink);
      font: inherit;
      background: #fff;
    }
    input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.18);
      border-color: rgba(15, 118, 110, 0.6);
    }
    .price-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .price-table input {
      min-width: 96px;
    }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 780px) {
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--border); padding: 10px 0; }
      td { border: 0; padding: 4px 0; }
      td::before { content: attr(data-label) "："; color: var(--muted); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>管理后台</h1>
        <p>手动批准、取消或禁用 VIP 权限，维护升格和觉醒使用的资质价格。</p>
      </div>
      <div class="actions">
        <a href="index.html">回到主页</a>
        <button id="refreshBtn" type="button">刷新</button>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </header>
    <section class="card">
      <div class="section-head">
        <div>
          <h2>VIP 用户</h2>
          <p>批准、回退或禁用注册账号。</p>
        </div>
        <div class="status" id="userStatus" role="status">正在检查管理员权限...</div>
      </div>
      <table aria-label="用户列表">
        <thead>
          <tr>
            <th>Email</th>
            <th>公会</th>
            <th>ID 名字</th>
            <th>邮箱确认</th>
            <th>角色</th>
            <th>申请时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userRows"></tbody>
      </table>
    </section>
    <section class="card">
      <div class="section-head">
        <div>
          <h2>资质价格</h2>
          <p>升格成本使用狗粮单价，觉醒净投入使用出货价格。</p>
        </div>
        <div class="actions">
          <button id="reloadPricesBtn" type="button">重载价格</button>
          <button id="savePricesBtn" class="primary" type="button">保存价格</button>
        </div>
      </div>
      <div class="price-grid">
        <label class="field">
          星钻/绑钻比例
          <input id="starRatioInput" type="number" min="0.0001" step="0.0001" inputmode="decimal" />
        </label>
      </div>
      <table class="price-table" aria-label="资质价格表">
        <thead>
          <tr>
            <th>资质</th>
            <th>狗粮单价</th>
            <th>出货价格</th>
          </tr>
        </thead>
        <tbody id="priceRows"></tbody>
      </table>
      <div class="section-head" style="margin:14px 0 0;">
        <div class="meta" id="priceMeta"></div>
        <div class="status" id="priceStatus" role="status">等待加载价格...</div>
      </div>
    </section>
  </div>

  <script type="module">
    import * as identity from "https://esm.sh/@netlify/identity?bundle";

    const userStatusEl = document.getElementById("userStatus");
    const rowsEl = document.getElementById("userRows");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const priceStatusEl = document.getElementById("priceStatus");
    const priceRowsEl = document.getElementById("priceRows");
    const priceMetaEl = document.getElementById("priceMeta");
    const starRatioInput = document.getElementById("starRatioInput");
    const reloadPricesBtn = document.getElementById("reloadPricesBtn");
    const savePricesBtn = document.getElementById("savePricesBtn");

    const TIER_ORDER = ["C-", "C", "C+", "B-", "B", "B+", "A-", "A", "A+", "S", "SS", "SSS"];

    async function restoreIdentitySession() {
      await identity.handleAuthCallback().catch(() => null);
      if (typeof identity.hydrateSession === "function") {
        await identity.hydrateSession().catch(() => null);
      }
      return identity.getUser().catch(() => null);
    }

    async function api(path, options) {
      const response = await fetch(path, {
        credentials: "include",
        ...(options || {}),
        headers: {
          "Content-Type": "application/json",
          ...((options && options.headers) || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function render(users) {
      rowsEl.innerHTML = "";
      for (const user of users) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="Email">${escapeHtml(user.email)}</td>
          <td data-label="公会">${escapeHtml(user.guild)}</td>
          <td data-label="ID 名字">${escapeHtml(user.gameName)}</td>
          <td data-label="邮箱确认">${emailStatus(user)}</td>
          <td data-label="角色">${escapeHtml(user.role)}</td>
          <td data-label="申请时间">${escapeHtml(user.requestedAt || user.createdAt)}</td>
          <td data-label="操作">
            <div class="actions">
              <button data-role="vip" type="button">设为 VIP</button>
              <button data-role="pending" type="button">待审核</button>
              <button data-role="blocked" type="button">禁用</button>
            </div>
          </td>
        `;
        tr.querySelectorAll("button[data-role]").forEach((button) => {
          button.addEventListener("click", () => setRole(user.email, button.dataset.role));
        });
        rowsEl.appendChild(tr);
      }
    }

    function renderPrices(data) {
      const rows = Array.isArray(data.tiers) ? data.tiers : [];
      const byTier = new Map(rows.map((row) => [String(row.tier || "").toUpperCase(), row]));
      starRatioInput.value = Number(data.starDiamondBoundDiamondRatio || 0);
      priceRowsEl.innerHTML = "";
      for (const tier of TIER_ORDER) {
        const row = byTier.get(tier) || {};
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="资质">${tier}</td>
          <td data-label="狗粮单价"><input data-tier="${tier}" data-field="foodPrice" type="number" min="0" step="1" inputmode="numeric" value="${Number(row.foodPrice || 0)}" /></td>
          <td data-label="出货价格"><input data-tier="${tier}" data-field="keptPrice" type="number" min="0" step="1" inputmode="numeric" value="${Number(row.keptPrice || 0)}" /></td>
        `;
        priceRowsEl.appendChild(tr);
      }
      priceMetaEl.textContent = "";
      const meta = [
        data.storage ? `存储：${data.storage}` : "",
        data.updatedAt ? `更新：${data.updatedAt}` : "",
        data.updatedBy ? `操作：${data.updatedBy}` : ""
      ].filter(Boolean);
      for (const item of meta) {
        const span = document.createElement("span");
        span.textContent = item;
        priceMetaEl.appendChild(span);
      }
    }

    function emailStatus(user) {
      if (user.emailVerified === true || user.emailConfirmedAt) return "已确认";
      if (user.emailVerified === false) return "未确认";
      return "未知";
    }

    async function loadUsers() {
      userStatusEl.textContent = "正在加载用户...";
      const currentUser = await restoreIdentitySession();
      if (!currentUser) {
        window.location.href = "Login.html?next=Admin.html";
        return;
      }
      const data = await api("/api/admin/users");
      render(data.users || []);
      userStatusEl.textContent = data.identitySyncError
        ? `已加载 ${(data.users || []).length} 个申请账号，但邮箱确认状态未能从 Identity 刷新：${data.identitySyncError}`
        : `已加载 ${(data.users || []).length} 个申请账号。`;
    }

    async function setRole(email, role) {
      userStatusEl.textContent = `正在更新 ${email}...`;
      await api("/api/admin/set-role", {
        method: "POST",
        body: JSON.stringify({ email, role })
      });
      await loadUsers();
    }

    async function loadPrices() {
      priceStatusEl.textContent = "正在加载价格...";
      const data = await api("/api/admin/quality-prices");
      renderPrices(data);
      priceStatusEl.textContent = data.storageError
        ? `已载入默认价格，价格存储读取失败：${data.storageError}`
        : "价格已加载。";
    }

    function collectPrices() {
      const tiers = TIER_ORDER.map((tier) => {
        const foodInput = priceRowsEl.querySelector(`input[data-tier="${tier}"][data-field="foodPrice"]`);
        const keptInput = priceRowsEl.querySelector(`input[data-tier="${tier}"][data-field="keptPrice"]`);
        return {
          tier,
          foodPrice: Number(foodInput && foodInput.value),
          keptPrice: Number(keptInput && keptInput.value)
        };
      });
      return {
        starDiamondBoundDiamondRatio: Number(starRatioInput.value),
        tiers
      };
    }

    async function savePrices() {
      priceStatusEl.textContent = "正在保存价格...";
      const data = await api("/api/admin/quality-prices", {
        method: "POST",
        body: JSON.stringify(collectPrices())
      });
      renderPrices(data.prices || {});
      priceStatusEl.textContent = "价格已保存，计算器会读取最新价格。";
    }

    refreshBtn.addEventListener("click", () => loadUsers().catch((error) => {
      userStatusEl.textContent = "加载失败：" + (error.message || error);
    }));
    reloadPricesBtn.addEventListener("click", () => loadPrices().catch((error) => {
      priceStatusEl.textContent = "价格加载失败：" + (error.message || error);
    }));
    savePricesBtn.addEventListener("click", () => savePrices().catch((error) => {
      priceStatusEl.textContent = "价格保存失败：" + (error.message || error);
    }));
    logoutBtn.addEventListener("click", async () => {
      await identity.logout();
      window.location.href = "Login.html?next=Admin.html";
    });

    Promise.all([
      loadUsers(),
      loadPrices()
    ]).catch((error) => {
      userStatusEl.textContent = "没有权限或加载失败：" + (error.message || error);
      priceStatusEl.textContent = "没有权限或加载失败：" + (error.message || error);
    });
  </script>
</body>
</html>
