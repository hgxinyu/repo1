  <style>
    :root {
      --gap: 12px;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      --border: #e2e8f0;
      --ink: #0f172a;
      --muted: #64748b;
      --brand: #6366f1;
      --danger: #ef4444;
      --surface: #ffffff;
      --bg: #f8fafc;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    nav#topbar-nav {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 100;
      margin: 0;
      width: auto;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: saturate(140%) blur(6px);
    }
    nav#topbar-nav a {
      border: 1px solid transparent;
      background: rgba(99, 102, 241, 0.08);
      color: var(--brand);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      text-align: center;
    }
    nav#topbar-nav a:hover {
      background: rgba(99, 102, 241, 0.16);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.28);
    }
    nav#topbar-nav a:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }
    .langbar {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 120;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: saturate(140%) blur(6px);
    }
    .langbar .btn {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: none;
    }
    .wrap {
      width: min(960px, 100%);
      margin: 12px auto 32px;
      padding: clamp(20px, 4vw, 36px);
      display: flex;
      flex-direction: column;
      gap: clamp(18px, 4vw, 28px);
      flex: 1 0 auto;
    }
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: clamp(14px, 4vw, 20px);
    }
    .title h1 {
      margin: 0;
      font-size: clamp(22px, 5.6vw, 32px);
      letter-spacing: 0.03em;
    }
    .title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tools {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid rgba(99, 102, 241, 0.35);
      background: var(--surface);
      color: var(--brand);
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      touch-action: manipulation;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(99, 102, 241, 0.24);
    }
    main.main {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(16px, 4vw, 24px);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(18px, 4vw, 28px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: clamp(16px, 4vw, 24px);
    }
    .card h2 {
      margin: 0;
      font-size: 18px;
      color: var(--muted);
    }
    .hint {
      padding: 12px 16px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.18);
      border-radius: 14px;
      color: #312e81;
      font-size: 14px;
      line-height: 1.7;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      align-items: flex-start;
    }
    .col {
      flex: 1 1 220px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      color: var(--muted);
      font-size: 14px;
    }
    input[type="number"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      -moz-appearance: textfield;
    }
    input[type="number"] {
      border: 2px solid rgba(99, 102, 241, 0.35);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.14);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"]:focus-visible,
    select:focus-visible {
      outline: none;
    }
    input[type="number"]:focus-visible {
      border-color: rgba(99, 102, 241, 0.9);
      background: rgba(99, 102, 241, 0.11);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), 0 12px 24px rgba(99, 102, 241, 0.2);
    }
    select:focus-visible {
      outline: 2px solid rgba(99, 102, 241, 0.35);
      outline-offset: 2px;
    }
    .warn {
      display: none;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(254, 226, 226, 0.9);
      border: 1px solid #fecaca;
      color: var(--danger);
      font-size: 14px;
    }
    .out {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--gap);
    }
    .box {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kv {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 15px;
    }
    .v {
      font-weight: 700;
      font-size: clamp(18px, 5vw, 24px);
      color: #1d4ed8;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .muted:empty {
      display: none;
    }
    .box.highlight {
      background: #fff7ed;
      border: 2px solid #fb923c;
      box-shadow: 0 8px 18px rgba(251, 146, 60, 0.2);
    }
    .box.highlight .v {
      color: #c2410c;
    }
    .logo-bottom-left {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      color: #111827;
    }
    .logo-bottom-left .logo-by {
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-left .logo-cn,
    .logo-bottom-left .logo-en {
      font-size: 20px;
      line-height: 1;
    }
    .logo-bottom-left .logo-cn {
      font-weight: 700;
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
    }
    .logo-bottom-left .logo-en {
      font-weight: 700;
      font-family: 'Pacifico', cursive;
    }
    .logo-bottom-left .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
    }
    @media (max-width: 720px) {
      nav#topbar-nav {
        right: 8px;
        top: 8px;
      }
    }
    @media (max-width: 480px) {
      html, body {
        font-size: 15px;
      }
      nav#topbar-nav {
        gap: 8px;
        padding: 8px 10px;
      }
      nav#topbar-nav a {
        font-size: 13px;
        padding: 8px 12px;
      }
      .btn {
        font-size: 14px;
        padding: 10px 14px;
      }
      input[type="number"],
      select {
        font-size: 15px;
      }
      .logo-bottom-left {
        position: static;
        margin: 28px auto 16px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <nav id="topbar-nav" aria-label="页面导航">
    <a href="index.html" id="navHome">回到主页</a>
  </nav>

  <div class="langbar" style="display:none;">
    <button class="btn" id="langToggle" type="button">EN</button>
  </div>

  <div class="wrap">
    <header class="site-header">
      <div class="title">
        <h1 id="pageTitle">凝魂升格 & 魂力计算器</h1>
        <p id="pageDesc">输入当前属性并计算结果。</p>
      </div>
      <div class="tools">
        <div class="col" style="flex: 0 0 220px; gap: 4px;">
          <label for="stageMode" id="stageModeLabel">升格阶段</label>
          <select id="stageMode" aria-label="升格阶段">
            <option value="a_to_aplus">A → A+</option>
            <option value="aplus_to_s" selected>A+ → S</option>
          </select>
        </div>
        <button class="btn" id="clearBtn" type="button">清空</button>
      </div>
    </header>

    <div class="hint" id="hintText">升格材料要求：<strong>3 × A-</strong>、<strong>2 × A</strong>、<strong>1 × A+</strong></div>

    <main class="main">
      <section class="card" aria-labelledby="calc-title">
        <h2 id="calc-title">填写基础属性</h2>
        <div class="row">
          <div class="col">
            <label for="atk" id="atkLabel">攻击 x</label>
            <input id="atk" type="number" inputmode="decimal" min="1" max="9900" value="1" aria-label="攻击数值" />
          </div>
          <div class="col">
            <label for="hp" id="hpLabel">血量 y</label>
            <input id="hp" type="number" inputmode="decimal" min="1" max="9900" value="1" aria-label="血量数值" />
          </div>
          <div class="col">
            <label for="spd" id="spdLabel">速度 z</label>
            <input id="spd" type="number" inputmode="decimal" min="1" max="99" value="1" aria-label="速度数值" />
          </div>
        </div>

        <div id="warn" class="warn" role="alert">输入错误：x + y + 100 × z 必须在 <strong>21600 ~ 24297</strong> 区间内。</div>

        <div class="out" aria-live="polite">
          <div class="box">
            <div class="kv"><span id="avgLabel">Average</span><span class="v" id="avgValue">0.00</span></div>
          </div>
          <div class="box">
            <div class="kv"><span id="timesLabel">凝魂次数</span><span class="v" id="times">0</span></div>
            <span class="muted" id="timesDesc"></span>
          </div>
          <div class="box highlight">
            <div class="kv"><span id="powerLabel">魂力值</span><span class="v" id="powerValue">—</span></div>
            <span class="muted" id="powerDesc"></span>
          </div>
        </div>
      </section>

      <section class="card" aria-labelledby="price-title">
        <h2 id="price-title">凝魂性价比</h2>
        <p class="muted" style="margin:-4px 0 4px;" id="priceDesc">下方输入框只填各资质单价，留空表示忽略该资质。</p>
        <div class="row">
          <div class="col">
            <label for="priceBMinus" id="priceBMinusLabel">B- 单价</label>
            <input id="priceBMinus" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceB" id="priceBLabel">B 单价</label>
            <input id="priceB" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceBPlus" id="priceBPlusLabel">B+ 单价</label>
            <input id="priceBPlus" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
        </div>
        <div class="row">
          <div class="col">
            <label for="priceAMinus" id="priceAMinusLabel">A- 单价</label>
            <input id="priceAMinus" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceA" id="priceALabel">A 单价</label>
            <input id="priceA" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceAPlus" id="priceAPlusLabel">A+ 单价</label>
            <input id="priceAPlus" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
        </div>
        <div class="row">
          <div class="col">
            <label for="priceS" id="priceSLabel">S 单价</label>
            <input id="priceS" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceSS" id="priceSSLabel">SS 单价</label>
            <input id="priceSS" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
          <div class="col">
            <label for="priceSSS" id="priceSSSLabel">SSS 单价</label>
            <input id="priceSSS" type="number" inputmode="decimal" min="0" step="any" placeholder="留空=忽略" />
          </div>
        </div>

        <div class="out" aria-live="polite">
          <div class="box">
            <div class="kv"><span id="bestComboLabel">最优组合</span><span class="v" id="bestComboValue">—</span></div>
            <span class="muted" id="bestComboDesc">达到1200经验的最低成本吃法</span>
          </div>
          <div class="box">
            <div class="kv"><span id="bestCostLabel">凝魂成本</span><span class="v" id="bestCostValue">—</span></div>
            <span class="muted" id="bestCostDesc">仅根据已填写价格计算</span>
          </div>
          <div class="box">
            <div class="kv"><span id="bestExpLabel">总经验</span><span class="v" id="bestExpValue">—</span></div>
            <span class="muted" id="bestEffDesc">成本/所需总经验：—</span>
          </div>
          <div class="box">
            <div class="kv"><span id="ascCostLabel">升格成本</span><span class="v" id="ascCostValue">—</span></div>
            <span class="muted" id="ascCostDesc">3×A- + 2×A + 1×A+</span>
          </div>
          <div class="box highlight">
            <div class="kv"><span id="totalCostLabel">总成本（高亮）</span><span class="v" id="totalCostValue">—</span></div>
            <span class="muted" id="totalCostDesc"></span>
          </div>
        </div>
      </section>
    </main>
  </div>

      function toNum(value) {
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : 0;

      function clampInputValue(input, min, max) {
        const raw = String(input.value || '').trim();
        if (!raw) return;
        const n = parseFloat(raw);
        if (!Number.isFinite(n)) return;
        const clamped = Math.min(max, Math.max(min, n));
        if (clamped !== n) {
          input.value = String(clamped);
        }
      }

      function parseCsvLine(line) {
        const out = [];
        let cur = '';
        let inQuote = false;
        for (let i = 0; i < line.length; i += 1) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuote && line[i + 1] === '"') {
              cur += '"';
              i += 1;
            } else {
              inQuote = !inQuote;
            }
          } else if (ch === ',' && !inQuote) {
            out.push(cur);
            cur = '';
          } else {
            cur += ch;
          }
        }
        out.push(cur);
        return out;
      }

      function parseTierData(csvText) {
        const normalized = String(csvText || '').replace(/^\uFEFF/, '');
        const lines = normalized.split(/\r?\n/).filter((line) => String(line).trim().length > 0);
        if (!lines.length) return [];
        const headers = parseCsvLine(lines[0]).map((h) => String(h || '').trim());
        const idxLevel = headers.indexOf('级别');
        const idxMinAvg = headers.indexOf('平均分值');
        const idxAscNeed = headers.indexOf('升格需求');
        const idxSoulProgress = headers.indexOf('凝魂进度');
        const idxSoulEnhance = headers.indexOf('凝魂强化');
        const idxUpperCap = headers.indexOf('魂点上限');
        if ([idxLevel, idxMinAvg, idxAscNeed, idxSoulProgress, idxSoulEnhance, idxUpperCap].some((idx) => idx < 0)) {
          return [];
        }
        const parsed = [];
        for (let i = 1; i < lines.length; i += 1) {
          const cols = parseCsvLine(lines[i]);
          const level = String(cols[idxLevel] || '').trim();
          const minAvg = Number(String(cols[idxMinAvg] || '').trim());
          const ascNeed = String(cols[idxAscNeed] || '').trim();
          const soulProgress = Number(String(cols[idxSoulProgress] || '').trim());
          const soulEnhance = Number(String(cols[idxSoulEnhance] || '').trim());
          const upperCap = Number(String(cols[idxUpperCap] || '').trim());
          if (!level || !Number.isFinite(minAvg) || minAvg <= 0) continue;
          if (!Number.isFinite(soulProgress) || soulProgress <= 0) continue;
          if (!Number.isFinite(soulEnhance) || soulEnhance <= 0) continue;
          if (!Number.isFinite(upperCap) || upperCap < 0) continue;
          const maxAvg = String(level).toLowerCase() === 'sss' ? SSS_TOP_AVG : null;
          parsed.push({ level, minAvg, ascNeed, soulProgress, soulEnhance, upperCap, maxAvg });
        }
        parsed.sort((a, b) => a.minAvg - b.minAvg);
        return parsed;
      }

      async function loadTiers() {
        const candidates = ['soul_tiers.csv', './soul_tiers.csv', '/flipgame/soul_tiers.csv', '凝魂.csv', './凝魂.csv', '../凝魂.csv'];
        let lastErr = null;
        for (const p of candidates) {
          try {
            const response = await fetch(p, { cache: 'no-cache' });
            if (!response.ok) {
              lastErr = new Error(`HTTP ${response.status} for ${p}`);
              continue;
            }
            const text = await response.text();
            const parsed = parseTierData(text);
            if (parsed.length) {
              tiers = parsed;
              return;
            }
            lastErr = new Error(`No valid tiers in ${p}`);
          } catch (err) {
            lastErr = err;
          }
        }
        throw lastErr || new Error('Failed to load tier data');
      }

      function findTierIndex(avg) {
        if (!tiers.length) return null;
        for (let i = tiers.length - 1; i >= 0; i -= 1) {
          if (avg >= tiers[i].minAvg) return i;
        }
        return null;
      }

      function parsePrice(value) {
        const raw = String(value || '').trim();
        if (!raw) return null;
        const parsed = parseFloat(raw);
        return Number.isFinite(parsed) && parsed >= 0 ? parsed : null;
      }

      function getPriceByTier(level) {
        const normalized = String(level || '').trim().toUpperCase();
        if (normalized === 'B-') return parsePrice(priceBMinus.value);
        if (normalized === 'B') return parsePrice(priceB.value);
        if (normalized === 'B+') return parsePrice(priceBPlus.value);
        if (normalized === 'A-') return parsePrice(priceAMinus.value);
        if (normalized === 'A') return parsePrice(priceA.value);
        if (normalized === 'A+') return parsePrice(priceAPlus.value);
        if (normalized === 'S') return parsePrice(priceS.value);
        if (normalized === 'SS') return parsePrice(priceSS.value);
        if (normalized === 'SSS') return parsePrice(priceSSS.value);
        return null;
      }

      function calculateMergeCost(requirementText) {
        const reqRaw = String(requirementText || '').trim();
        if (!reqRaw || reqRaw === '/' || reqRaw === '无') {
          return { calculable: false, missingPrice: false, cost: null };
        }
        const normalized = reqRaw.replace(/[，]/g, ',');
        const regex = /(\d+)\s*([A-Za-z][A-Za-z+\-]*)/g;
        let matched = false;
        let missingPrice = false;
        let total = 0;
        let m;
        while ((m = regex.exec(normalized)) !== null) {
          matched = true;
          const count = Number(m[1]);
          const tier = String(m[2] || '').toUpperCase();
          const price = getPriceByTier(tier);
          if (!Number.isFinite(price)) {
            missingPrice = true;
            continue;
          }
          total += count * price;
        }
        if (!matched) {
          return { calculable: false, missingPrice: false, cost: null };
        }
        if (missingPrice) {
          return { calculable: true, missingPrice: true, cost: null };
        }
        return { calculable: true, missingPrice: false, cost: total };
      }

      function estimatePower(avg, tierIndex) {
        if (tierIndex === null || tierIndex < 0 || !tiers.length) return null;
        const tier = tiers[tierIndex];
        const prevUpper = tierIndex > 0 ? tiers[tierIndex - 1].upperCap : 0;
        const nextMin = tierIndex < tiers.length - 1 ? tiers[tierIndex + 1].minAvg : tier.minAvg;
        const upperAvg = Number.isFinite(tier.maxAvg) ? tier.maxAvg : nextMin;
        if (!Number.isFinite(tier.upperCap) || !Number.isFinite(prevUpper)) return null;
        if (!(upperAvg > tier.minAvg)) return tier.upperCap;
        const ratio = Math.max(0, Math.min(1, (avg - tier.minAvg) / (upperAvg - tier.minAvg)));
        return prevUpper + ratio * (tier.upperCap - prevUpper);
      }

      function calcBestFeedPlan(targetExp) {
        totalCostDesc.textContent = t('total_cost_desc');

        if (!Number.isFinite(targetExp) || targetExp <= 0) {
          bestComboValue.textContent = t('need_valid_stats');
          bestCostValue.textContent = t('dash');
          bestExpValue.textContent = t('dash');
          ascCostValue.textContent = t('dash');
          totalCostValue.textContent = t('dash');
          bestEffDesc.textContent = `${t('best_eff_desc')} ${t('dash')}`;
          return { ok: false, bestCost: null, bestExp: null };
        }

        const options = [
          { key: 'B-', exp: 50, price: parsePrice(priceBMinus.value) },
          { key: 'B', exp: 140, price: parsePrice(priceB.value) },
          { key: 'B+', exp: 340, price: parsePrice(priceBPlus.value) },
          { key: 'A-', exp: 3050, price: parsePrice(priceAMinus.value) },
          { key: 'A', exp: 5750, price: parsePrice(priceA.value) },
          { key: 'A+', exp: 10000, price: parsePrice(priceAPlus.value) },
          { key: 'S', exp: 26750, price: parsePrice(priceS.value) },
          { key: 'SS', exp: 37750, price: parsePrice(priceSS.value) },
          { key: 'SSS', exp: 72000, price: parsePrice(priceSSS.value) }
        ].filter((item) => item.price !== null);

        if (!options.length) {
          bestComboValue.textContent = t('no_price');
          bestCostValue.textContent = t('dash');
          bestExpValue.textContent = t('dash');
          ascCostValue.textContent = t('dash');
          totalCostValue.textContent = t('dash');
          bestEffDesc.textContent = `${t('best_eff_desc')} ${t('dash')}`;
          return { ok: false, bestCost: null, bestExp: null };
        }

        const maxExp = Math.max(...options.map((item) => item.exp));
        const cap = targetExp + maxExp;
        const dpCost = Array(cap + 1).fill(Infinity);
        const dpCount = Array(cap + 1).fill(Infinity);
        const prevExp = Array(cap + 1).fill(-1);
        const prevOpt = Array(cap + 1).fill(-1);
        dpCost[0] = 0;
        dpCount[0] = 0;

        for (let exp = 0; exp <= cap; exp += 1) {
          if (!Number.isFinite(dpCost[exp])) continue;
          for (let i = 0; i < options.length; i += 1) {
            const nextExp = exp + options[i].exp;
            if (nextExp > cap) continue;
            const nextCost = dpCost[exp] + options[i].price;
            const nextCount = dpCount[exp] + 1;
            const betterCost = nextCost < dpCost[nextExp];
            const sameCostLessItems = nextCost === dpCost[nextExp] && nextCount < dpCount[nextExp];
            if (betterCost || sameCostLessItems) {
              dpCost[nextExp] = nextCost;
              dpCount[nextExp] = nextCount;
              prevExp[nextExp] = exp;
              prevOpt[nextExp] = i;
            }
          }
        }

        let bestExp = -1;
        let bestCost = Infinity;
        let bestCount = Infinity;
        for (let exp = targetExp; exp <= cap; exp += 1) {
          if (!Number.isFinite(dpCost[exp])) continue;
          const lowerCost = dpCost[exp] < bestCost;
          const sameCostLowerOverflow = dpCost[exp] === bestCost && exp < bestExp;
          const sameCostOverflowLessItems = dpCost[exp] === bestCost && exp === bestExp && dpCount[exp] < bestCount;
          if (lowerCost || sameCostLowerOverflow || sameCostOverflowLessItems) {
            bestExp = exp;
            bestCost = dpCost[exp];
            bestCount = dpCount[exp];
          }
        }

        if (bestExp < 0) {
          bestComboValue.textContent = t('no_solution');
          bestCostValue.textContent = t('dash');
          bestExpValue.textContent = t('dash');
          ascCostValue.textContent = t('dash');
          totalCostValue.textContent = t('dash');
          bestEffDesc.textContent = `${t('best_eff_desc')} ${t('dash')}`;
          return { ok: false, bestCost: null, bestExp: null };
        }

        const counts = {};
        let cursor = bestExp;
        while (cursor > 0 && prevOpt[cursor] !== -1) {
          const opt = options[prevOpt[cursor]];
          counts[opt.key] = (counts[opt.key] || 0) + 1;
          cursor = prevExp[cursor];
        }

        const parts = Object.keys(counts).sort().map((key) => `${key}×${counts[key]}`);
        bestComboValue.textContent = parts.length ? parts.join(' + ') : t('dash');
        bestCostValue.textContent = Number.isFinite(bestCost) ? bestCost.toFixed(2) : t('dash');
        bestExpValue.textContent = bestExp >= 0 ? String(bestExp) : t('dash');
        ascCostValue.textContent = t('dash');
        totalCostValue.textContent = t('dash');
        bestEffDesc.textContent = `${t('best_eff_desc')} ${(bestCost / targetExp).toFixed(4)}`;
        return { ok: true, bestCost, bestExp };
      }

      function update() {
        if (!tiers.length) {
          warn.style.display = 'block';
          times.textContent = t('dash');
          avgValue.textContent = t('dash');
          powerValue.textContent = t('dash');
          calcBestFeedPlan(0);
          return;
        }
        const x = toNum(atk.value);
        const y = toNum(hp.value);
        const z = toNum(spd.value);
        const totalA = x + y + (100 * z);
        const totalB = x + y + (100 * (z + 1));
        const avgA = totalA / 3;
        const avgB = totalB / 3;
        const avgMin = Math.min(avgA, avgB);
        const avgMax = Math.max(avgA, avgB);
        avgValue.textContent = Math.round(avgMin) === Math.round(avgMax)
          ? `${Math.round(avgMin)}`
          : `${Math.round(avgMin)} ~ ${Math.round(avgMax)}`;

        function calcVariant(total) {
          const avg = total / 3;
          const tierIndex = findTierIndex(avg);
          if (tierIndex === null) return null;
          const tier = tiers[tierIndex];
          const targetAvg = tierIndex < tiers.length - 1 ? tiers[tierIndex + 1].minAvg : SSS_TOP_AVG;
          const enhance = tier.soulEnhance;
          const progress = tier.soulProgress;
          if (!Number.isFinite(enhance) || enhance <= 0) return null;
          if (!Number.isFinite(progress) || progress <= 0) return null;
          const need = (targetAvg * 3 - total) / enhance;
          const count = Math.max(0, Math.ceil(need));
          const power = estimatePower(avg, tierIndex);
          return { avg, tier, tierIndex, targetAvg, count, requiredExp: count * progress, power };
        }

        const vA = calcVariant(totalA);
        const vB = calcVariant(totalB);
        const variants = [vA, vB].filter(Boolean);
        const validA = Boolean(vA);
        const validB = Boolean(vB);
        const validAny = validA || validB;
        warn.style.display = (!touched || validAny) ? 'none' : 'block';

        let requiredTotalExp = 0;
        if (validAny) {
          const counts = variants.map((v) => v.count);
          const minCount = Math.min(...counts);
          const maxCount = Math.max(...counts);
          times.textContent = minCount === maxCount ? String(minCount) : `${minCount} ~ ${maxCount}`;
          requiredTotalExp = Math.max(...variants.map((v) => v.requiredExp));

          const levels = [...new Set(variants.map((v) => String(v.tier.level || '').toUpperCase()))];
          const needs = [...new Set(variants.map((v) => String(v.tier.ascNeed || '/').replace(/^\//, '无')))];
          const progressSet = [...new Set(variants.map((v) => Number(v.tier.soulProgress)))];
          const enhanceSet = [...new Set(variants.map((v) => Number(v.tier.soulEnhance)))];
          const progressText = progressSet.length === 1 ? `${progressSet[0]}` : `${Math.min(...progressSet)} ~ ${Math.max(...progressSet)}`;
          const enhanceText = enhanceSet.length === 1 ? `${enhanceSet[0]}` : `${Math.min(...enhanceSet)} ~ ${Math.max(...enhanceSet)}`;
          const needText = needs.join(' / ');
          const levelText = levels.join(' ~ ');
          const targetAvgSet = [...new Set(variants.map((v) => v.targetAvg))];
          const targetText = targetAvgSet.length === 1 ? `${targetAvgSet[0]}` : `${Math.min(...targetAvgSet)} ~ ${Math.max(...targetAvgSet)}`;
          const powers = variants.map((v) => v.power).filter((v) => Number.isFinite(v));
          if (powers.length) {
            const pMin = Math.min(...powers);
            const pMax = Math.max(...powers);
            powerValue.textContent = Math.round(pMin) === Math.round(pMax)
              ? `${Math.round(pMin)}`
              : `${Math.round(pMin)} ~ ${Math.round(pMax)}`;
          } else {
            powerValue.textContent = t('dash');
          }
          hintText.innerHTML = currentLang === 'zh'
            ? `当前资质：<strong>${levelText}</strong>；升格需求：<strong>${needText}</strong>；每次凝魂经验：<strong>${progressText}</strong>；每次凝魂强化总额：<strong>${enhanceText}</strong>；目标均值：<strong>${targetText}</strong>`
            : `Current Tier: <strong>${levelText}</strong>; Merge Needs: <strong>${needText}</strong>; EXP per Soul Perfection: <strong>${progressText}</strong>; Soul Enhance per time: <strong>${enhanceText}</strong>; Target Avg: <strong>${targetText}</strong>`;
          ascCostDesc.textContent = needText;
          priceDesc.textContent = currentLang === 'zh'
            ? '下方输入框只填各资质单价，留空表示忽略该资质。'
            : 'Enter unit prices only. Blank means ignored.';
        } else {
          times.textContent = t('dash');
          powerValue.textContent = t('dash');
          hintText.textContent = t('asc_cost_desc_aplus_to_s');
          ascCostDesc.textContent = t('asc_cost_desc_aplus_to_s');
        }

        const feedPlan = calcBestFeedPlan(requiredTotalExp);
        if (!feedPlan.ok || !Number.isFinite(feedPlan.bestCost) || !validAny) {
          return;
        }

        const mergeResults = variants.map((v) => calculateMergeCost(v.tier.ascNeed));
        const hasMergePath = mergeResults.some((r) => r.calculable);
        if (!hasMergePath) {
          ascCostValue.textContent = t('dash');
          totalCostValue.textContent = t('dash');
          return;
        }
        if (mergeResults.some((r) => r.missingPrice)) {
          ascCostValue.textContent = t('need_merge_prices');
          totalCostValue.textContent = t('dash');
          return;
        }

        const ascCosts = mergeResults.map((r) => r.cost).filter((v) => Number.isFinite(v));
        if (!ascCosts.length) {
          ascCostValue.textContent = t('dash');
          totalCostValue.textContent = t('dash');
          return;
        }
        const ascMin = Math.min(...ascCosts);
        const ascMax = Math.max(...ascCosts);
        ascCostValue.textContent = ascMin === ascMax
          ? ascMin.toFixed(2)
          : `${ascMin.toFixed(2)} ~ ${ascMax.toFixed(2)}`;

        const totalMin = feedPlan.bestCost + ascMin;
        const totalMax = feedPlan.bestCost + ascMax;
        totalCostValue.textContent = totalMin === totalMax
          ? totalMin.toFixed(2)
          : `${totalMin.toFixed(2)} ~ ${totalMax.toFixed(2)}`;
      }

      function debouncedUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(update, 140);
      }

      [atk, hp, spd].forEach((input) => {
        input.addEventListener('input', () => {
          if (input === spd) {
            clampInputValue(input, 1, 99);
          } else {
            clampInputValue(input, 1, 9900);
          }
          touched = true;
          debouncedUpdate();
        });
        input.addEventListener('change', () => {
          if (!String(input.value || '').trim()) {
            input.value = '1';
          }
          if (input === spd) {
            clampInputValue(input, 1, 99);
          } else {
            clampInputValue(input, 1, 9900);
          }
          touched = true;
          update();
        });
      });

      [priceBMinus, priceB, priceBPlus, priceAMinus, priceA, priceAPlus, priceS, priceSS, priceSSS].forEach((input) => {
        input.addEventListener('input', debouncedUpdate);
        input.addEventListener('change', update);
      });
      [atk, hp, spd, priceBMinus, priceB, priceBPlus, priceAMinus, priceA, priceAPlus, priceS, priceSS, priceSSS].forEach((input) => {
        input.addEventListener('focus', () => {
          if (String(input.value).trim() === '0' || String(input.value).trim() === '1') {
            input.select();
          }
        });
      });
      clearBtn.addEventListener('click', () => {
        atk.value = '1';
        hp.value = '1';
        spd.value = '1';
        priceBMinus.value = '';
        priceB.value = '';
        priceBPlus.value = '';
        priceAMinus.value = '';
        priceA.value = '';
        priceAPlus.value = '';
        priceS.value = '';
        priceSS.value = '';
        priceSSS.value = '';
        touched = false;
        atk.focus();
        update();
      });

      if (langToggle) {
        langToggle.addEventListener('click', () => {
          setLang(currentLang === 'zh' ? 'en' : 'zh');
        });
      }

      function enableAppSwipeHome() {
        const isAppMode = (
          (window.matchMedia && (
            window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches
          )) ||
          window.navigator.standalone === true
        );
        if (!isAppMode) return;
        const viewportMeta = document.querySelector('meta[name="viewport"]');
        if (viewportMeta) {
          viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover');
        }
        document.documentElement.classList.add('app-mode');
        document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
        document.addEventListener('gesturechange', (event) => event.preventDefault(), { passive: false });
        document.addEventListener('gestureend', (event) => event.preventDefault(), { passive: false });
        const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!hasTouch) return;
        if (navHome) navHome.style.display = 'none';
        if (topbarNav) topbarNav.style.display = 'none';
        let startX = 0;
        let startY = 0;
        let active = false;
        let horizontalIntent = false;
        let dx = 0;
        let dy = 0;
        document.addEventListener('touchstart', (event) => {
          if (!event.touches || event.touches.length !== 1) return;
          startX = event.touches[0].clientX;
          startY = event.touches[0].clientY;
          dx = 0;
          dy = 0;
          horizontalIntent = false;
          active = true;
        }, { passive: true });
        document.addEventListener('touchmove', (event) => {
          if (!active || !event.touches || !event.touches.length) return;
          dx = event.touches[0].clientX - startX;
          dy = event.touches[0].clientY - startY;
          if (!horizontalIntent && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.15) {
            horizontalIntent = true;
          }
          if (horizontalIntent) {
            event.preventDefault();
          }
        }, { passive: false });
        document.addEventListener('touchend', () => {
          if (!active) return;
          active = false;
          if (horizontalIntent && Math.abs(dx) >= 70 && Math.abs(dy) <= 60) {
            requestAnimationFrame(() => {
              window.location.replace('index.html');
            });
          }
          horizontalIntent = false;
          dx = 0;
          dy = 0;
        }, { passive: true });
      }

      enableAppSwipeHome();
      setStaticText();
      loadTiers()
        .then(() => {
          setStaticText();
          update();
        })
        .catch((err) => {
          console.error('Failed to load soul tiers:', err);
          warn.style.display = 'block';
          times.textContent = t('dash');
          avgValue.textContent = t('dash');
          hintText.textContent = currentLang === 'zh'
            ? '未能加载资质数据（soul_tiers.csv），请确认文件路径。'
            : 'Failed to load tier data (soul_tiers.csv). Please verify file path.';
          calcBestFeedPlan(0);
        });
    })();
  </script>
</body>
</html>
